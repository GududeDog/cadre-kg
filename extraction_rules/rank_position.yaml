category: basic_info
display_name: 职务与职级推断规则

position_rules:
  - '职务级别值域（从高到低）：正局级、副局级、正处级、副处级、正科级、副科级'
  - '从"现任职务"文本中识别单位名称和岗位名称，按以下规则推断：'
  - ''
  - '【正局级】'
  - '  - "区人大常委会主任" → 正局级'
  - '  - "区政协主席" → 正局级'
  - ''
  - '【副局级】'
  - '  以下岗位为区委常委或区人大/政协副职兼任，级别为副局级：'
  - '  - "区人大常委会副主任" → 副局级'
  - '  - "区政协副主席" → 副局级'
  - '  - "区纪委书记"、"区监委主任" → 副局级'
  - '  - "区委组织部部长" → 副局级'
  - '  - "区委宣传部部长" → 副局级'
  - '  - "区委统战部部长" → 副局级'
  - '  - "区委政法委书记" → 副局级'
  - '  - "区总工会主席" → 副局级'
  - ''
  - '【正处级】'
  - '  1. 区直部门、街道、地区、管委会、群团组织正职（一把手），且不在副局级名单中：'
  - '     - 岗位含"党工委书记"且不含"副书记" → 正处级'
  - '     - 岗位含"工委书记"且不含"副书记" → 正处级'
  - '     - 岗位含"党组书记"且不含"副书记" → 正处级'
  - '     - 岗位含"党委书记"且不含"副书记" → 正处级'
  - '     - 岗位为"主任"、"局长"、"部长"、"主席"、"理事长"（不含"副"字） → 正处级'
  - '     - 岗位含"常务"且为正职（常务副书记、常务副校长、常务副主席） → 正处级'
  - '     - 岗位含"分管日常工作的"（如分管日常工作的副部长、副书记） → 正处级'
  - '  2. 特殊岗位：'
  - '     - "区纪委副书记"、"区监委副主任" → 正处级'
  - '     - "区委巡察办主任" → 正处级'
  - '     - "巡察专员"且含"正处" → 正处级'
  - '  3. 街乡正职：'
  - '     - "街道党工委书记"、"街道办事处主任" → 正处级'
  - '     - "地区党工委书记"、"地区办事处主任"、"乡长" → 正处级'
  - '  4. 正处级事业单位一把手（以下单位的局长/主任/馆长/站长/校长/常务副校长）：'
  - '     - 区地震局、区委党校、区委党史工作办公室、区档案馆/地方志办、区农村合作经济经营管理站'
  - '     - 区农业农村综合服务中心、区宣传文化中心、区融媒体中心、区环境卫生服务中心'
  - '     - 区投资促进服务中心、区金融工作事务中心、区机关事务管理服务中心'
  - ''
  - '【副处级】'
  - '  1. 区直部门、街道、地区、管委会、群团组织副职：'
  - '     - 岗位含"党工委副书记"、"工委副书记"、"党组副书记"、"党委副书记" → 副处级'
  - '     - 岗位含"副主任"、"副局长"、"副部长" → 副处级'
  - '     - 岗位含"党组成员"、"党委委员"、"工委委员"且同时含副职 → 副处级'
  - '     - "区委巡察办副主任" → 副处级'
  - '     - "巡察专员"且含"副处" → 副处级'
  - '     - "派驻组组长" → 副处级'
  - '     - "专职副主任" → 副处级'
  - '  2. 民主党派：'
  - '     - "专职副主委" → 副处级'
  - '  3. 副处级事业单位一把手（以下单位的主任/馆长/院长）：'
  - '     - 区城市管理指挥中心、区房屋征收事务中心、区职工大学、北京民俗博物馆'
  - '     - 区建筑行业管理处、区劳动人事争议仲裁院、区人力资源公共服务中心'
  - '     - 区社会保险基金管理中心、区社区服务中心、区疾病预防控制中心'
  - '     - 区医疗机构管理中心、区医疗保险事务管理中心、区住房保障事务中心'
  - '     - 区文化创意产业发展中心、北京奥林匹克公园服务中心'
  - '  4. 街乡副职：'
  - '     - "街道党工委副书记"、"街道办事处副主任" → 副处级'
  - '     - "地区党工委副书记"、"地区办事处副主任" → 副处级'
  - '  5. 执法机构：'
  - '     - "城市管理综合行政执法局局长" → 副处级'
  - '     - "市场监管综合执法大队大队长"、"文化市场综合执法大队大队长"'
  - '     - "生态环境综合执法大队大队长"、"农业综合执法大队大队长"'
  - '     - "应急管理综合执法大队大队长" → 副处级'
  - ''
  - '【正科级】'
  - '  - "市场监管所所长" → 正科级'
  - ''
  - '【副科级】'
  - '  - "市场监管所副所长" → 副科级'
  - ''
  - '【判断优先级】'
  - '  1. 先匹配正局级、副局级（高级别优先）'
  - '  2. 再判断是否为副职（含"副"字或"副书记"）→ 副处级/副科级'
  - '  3. 注意特殊前缀："分管日常工作的"、"常务" → 正处级；"专职" → 副处级'
  - '  4. 注意特殊单位：事业单位主任可能是正处或副处，需对照上述名单'
  - '  5. 如果无法确定，position_level 填空字符串""，不编造'

rank_rules:
  - '职级值域（从高到低）：正局级、副局级、正处级、副处级、正科级、副科级、科员、办事员'
  - '从"现任职务"中识别职级关键词，按以下规则映射：'
  - ''
  - '【正局级】'
  - '"巡视员"、"一级巡视员"、"一级高级监察官"、"一级高级法官" → 正局级'
  - ''
  - '【副局级】'
  - '"副巡视员"、"二级巡视员"、"二级高级监察官"、"特级法官助理"、"二级高级法官"、"二级警务专员" → 副局级'
  - ''
  - '【正处级】'
  - '"调研员"、"一级调研员"、"一级高级主办"、"三级高级监察官"、"一级高级法官助理"、"一级高级书记员"、"三级高级法官"、"一级高级警长" → 正处级'
  - '"二级调研员"、"二级高级主办"、"二级高级法官助理"、"二级高级书记员"、"二级高级警长" → 正处级'
  - ''
  - '【副处级】'
  - '"副调研员"、"三级调研员"、"三级高级主办"、"四级高级监察官"、"三级高级法官助理"、"三级高级书记员"、"四级高级法官"、"三级高级警长" → 副处级'
  - '"四级调研员"、"四级高级主办"、"四级高级法官助理"、"四级高级书记员"、"四级高级警长" → 副处级'
  - ''
  - '【正科级】'
  - '"主任科员"、"一级主任科员"、"一级主办"、"一级监察官"、"二级监察官"、"一级法官助理"、"一级书记员"、"一级法官"、"一级警长" → 正科级'
  - '"二级主任科员"、"二级主办"、"二级法官助理"、"二级书记员"、"二级警长" → 正科级'
  - ''
  - '【副科级】'
  - '"副主任科员"、"三级主任科员"、"三级主办"、"三级监察官"、"四级监察官"、"三级法官助理"、"三级书记员"、"二级法官"、"三级警长" → 副科级'
  - '"四级主任科员"、"四级主办"、"四级法官助理"、"四级书记员"、"三级法官"、"四级警长" → 副科级'
  - ''
  - '【科员】'
  - '"科员"、"一级科员"、"五级监察官"、"六级监察官"、"五级法官助理"、"五级书记员"、"四级法官"、"五级法官"、"一级警员" → 科员'
  - ''
  - '【办事员】'
  - '"办事员"、"二级科员"、"二级警员" → 办事员'
  - ''
  - '【匹配优先级与注意事项】'
  - '  1. 匹配时取级别最高的那个（如同时出现"一级调研员"和"二级调研员"，取正处级）'
  - '  2. 职级关键词可能在逗号、顿号、空格分隔的任意位置，不限于最后一部分'
  - '  3. 如果"现任职务"中未出现以上任何职级关键词，rank_level 填空字符串""'
  - '  4. 如果无法匹配，填空，不编造'