category: basic_info
display_name: 基础信息

resume_rules:
  - '从简历文本中提取每一行任职经历，包括学生时期'
  - '职级优先从括号标注提取，如"(县处级副职)"→"副处级"；无括号标注时从职务名称推断'
  - '职级推断规则：科员/办事员→科员级；副主任科员→副科级；主任科员→正科级；副乡长/副主任/副书记/副县长/副局长→副处级；乡长/主任/书记/县长/局长→正处级；一级调研员/二级调研员→正处级；三级调研员/四级调研员→副处级'
  - '职务名称中同时出现的职等标记也要纳入rank，如"三级调研员"→rank="三级调研员"'
  - '每一行任职经历生成一个独立的Resume实体，不合并、不遗漏、不编造'
