category: org_evaluation
display_name: 组织评价材料

inspection_time_rules:
  - '从文档开头识别考察年份，如"考察组于2021年..." → 提取"2021"'
  - '考察年份为4位数字，如"2021""2022""2023"'
  - '如果文档中没有明确年份，填"unknown"'

core_traits_rules:
  - '每个干部评价段落的第一句通常是核心特点概括'
  - '核心特点是对该干部综合素质的高度概括，通常1-2句话'
  - '直接引用原文作为 core_traits，不要改写'
  - '附上对应的原文片段作为 source_fragment'
  - '例如：干部段落首句"熟悉全乡情况，思路清楚，大局意识强。" → core_traits = "熟悉全乡情况，思路清楚，大局意识强。"'

trait_evidence_rules:
  - '核心特点首句后的详细描述论证段落，LLM总结为100字以内的精炼摘要'
  - '摘要是对原文论证部分的浓缩，提炼2-3个关键论证点'
  - '保留原文中的关键事实（如任职年限、分管领域、重要成果等）'
  - '不要照搬原文，用自己的话精炼总结'

performance_rules:
  - '提取"工作实绩"或"工作业绩"标题下的全部正文内容'
  - '如果没有明确标题，提取核心特点后面的详细业绩描述'
  - '保留关键数据和具体事例'
  - '附上对应的原文片段作为 source_fragment'
  - '业绩内容较长时，可适当压缩但不丢失重要信息'

shortcoming_rules:
  - '提取"主要不足"标题下的每条不足'
  - '如果不足有编号（如一、二、三...），每条独立提取为一个 Shortcoming 实体'
  - '如果没有编号，整段作为一条不足提取'
  - '每条不足附上对应的原文片段作为 source_fragment'

familiar_field_rules:
  - '从评价文本中推断干部熟悉的专业领域，不是直接提取'
  - '候选领域：经济管理、城市建设、招商引资、党建工作、政法综治、纪检监察、社区建设、城市管理、社会治理、群众工作、信访维稳、安全生产、医疗卫生、教育文化、财政审计、规划建设、科技创新、应急管理、基层治理、农业农村、组织人事、宣传思想、统战工作、环境保护、统计审计'
  - '每个干部推断1-3个最匹配的熟悉领域'
  - '推断依据：评价中提到的分管工作、专长描述、工作经历。例如：文本提到"分管农村工作、基层治理"，则 field_name 为"农业农村""基层治理"'

style_tag_rules:
  - '从评价文本中总结干部的风格特点，从控词表中选择匹配的标签'
  - '控词表：担当精神、务实作风、法治思维、规矩意识、廉洁自律、团结同志、作风正派、严谨细致、事业心强、责任感强、统筹协调、应急处突、组织协调、团队建设、决策能力、执行落实、群众工作、依法办事、文字综合、沟通表达、学习能力、创新突破、基层治理'
  - '正面标签可为1-3个'
  - '如果评价中包含负面描述（"不足""不够""有待提高"等），可从负面标签中选择：能力短板、学习不足、创新不足、研究不深入、工作方式需改进、灵活性不足'
  - '每个 tag 附上对应的原文片段作为 source_fragment'
