category: research
display_name: 组织部大调研材料

personality_rules:
  - '从"1.主要特点"中提取性格描述。原文中通常包含"性格XX""比较XX""脾气XX"等关键词'
  - '从"2.问题、不足和希望"中也提取性格相关的负面描述'
  - '性格标签从候选词表中选择：直率、温和、沉稳、外向、内向、文静、内敛、活泼、热情、自来熟、主动、被动、耐心、急躁、冷静、强势、随和、固执、灵活、严谨、细致、粗心、踏实、浮躁、正直、直爽、爽朗、硬朗、开朗、孤僻、合群、豁达、拘谨、敏感、固执己见、平易近人、坚韧执着'
  - '原文如"性格直率，比较沉稳" → trait="直率" 且 trait="沉稳"'
  - '原文如"脾气有点急" → trait="急躁"'
  - '原文如"性格温和，态度认真" → trait="温和"'
  - '原文如"性格缺乏大胆创新" → trait="保守"（从负面描述中反向提取）'
  - '正面评价的性格标签填入 positive_eval 字段'
  - '负面评价的性格标签填入 negative_eval 字段'
  - '每个标签附上完整的原文描述片段作为 source_fragment'
  - '没有明确的性格描述时不编造'

ability_rules:
  - '从"1.主要特点"中提取能力特点描述'
  - '候选能力标签：沟通协调、协调推动、执行力、统筹协调、组织协调、决策能力、创新能力、学习能力、应变能力、文字综合、群众工作、应急处突、团队建设、业务能力、领导能力、统筹谋划、政策把握、规范管理、调研能力、指导能力、传帮带、科学决策、改革攻坚'
  - '从"2.问题、不足和希望"中也提取能力短板描述'
  - '原文如"说话办事执行力强" → ability_trait="执行力"'
  - '原文如"统筹协调能力强" → ability_trait="统筹协调"'
  - '原文如"沟通顺畅，有头脑，想法多" → ability_trait="沟通协调" 且 ability_trait="创新能力"'
  - '原文如"业务能力很强，经验丰富" → ability_trait="业务能力"'
  - '原文如"推进工作能力强，协调各方" → ability_trait="协调推动"'
  - '原文如"基层经验不足，缺乏系统思维" → ability_trait="统筹谋划"（标注为负面/不足）'
  - '每个能力特点附上原文描述片段作为 source_fragment'
  - '没有明确的能力描述时不编造'
  - '每个被评价人最多提取3个能力特点'
