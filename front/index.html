<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>干部画像分析系统</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
:root {
  --bg: #FAFAF8;
  --bg2: #F5F5F3;
  --white: #ffffff;
  --ink: #1A1A1A;
  --ink2: #666666;
  --ink3: #999999;
  --red: #E8636A;
  --red-bg: #FFEBEE;
  --red-border: #FFCDD2;
  --amber: #F57F17;
  --amber-bg: #FFF8E1;
  --amber-border: #FFE082;
  --green: #2E7D32;
  --green-bg: #E8F5E9;
  --green-border: #C8E6C9;
  --blue: #1565C0;
  --blue-bg: #E3F2FD;
  --blue-border: #BBDEFB;
  --border: #DDDAD2;
  --chart-red: #E8636A;
  --chart-blue: #3F51B5;
  --chart-green: #43A047;
  --chart-amber: #FFB300;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 13px;
  line-height: 1.6;
  min-width: 1280px;
}

.layout { display: grid; grid-template-columns: 280px 1fr; gap: 16px; padding: 16px; min-height: 100vh; }

.sidebar {
  background: var(--white);
  border-radius: 8px;
  overflow: hidden;
  height: fit-content;
  position: sticky; top: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  border: 1px solid var(--border);
}

.sidebar-search {
  padding: 12px 16px;
  background: #fff;
  border-bottom: 1px solid var(--border);
  display: flex; gap: 8px;
}
.sidebar-search input {
  flex: 1; min-width: 0;
  padding: 7px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 12px;
  outline: none;
  font-family: inherit;
  transition: border-color .15s;
}
.sidebar-search input:focus { border-color: var(--red); }
.sidebar-search button {
  padding: 7px 14px;
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  white-space: nowrap;
  transition: opacity .15s;
}
.sidebar-search button:hover { opacity: .9; }

.profile-head {
  background: linear-gradient(135deg, #E8636A 0%, #d4545c 100%);
  color: #fff;
  padding: 28px 20px 20px;
  text-align: center;
}
.avatar {
  width: 64px; height: 64px;
  background: rgba(255,255,255,0.2);
  border: 2px solid rgba(255,255,255,0.4);
  border-radius: 50%;
  margin: 0 auto 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: #fff;
}
.profile-id { font-size: 22px; font-weight: 600; letter-spacing: 2px; margin-bottom: 6px; }
.profile-title { font-size: 13px; opacity: 0.95; margin-bottom: 10px; word-break: break-all; }
.profile-rank {
  display: inline-block;
  background: rgba(255,255,255,0.25);
  border: 1px solid rgba(255,255,255,0.4);
  padding: 2px 12px;
  border-radius: 12px;
  font-size: 11px;
}

.tag-section { padding: 16px 18px; border-bottom: 1px solid var(--border); background: #FFF2F2; }
.tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { font-size: 11px; padding: 3px 10px; border-radius: 11px; font-weight: 500; }
.tag-red { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
.tag-blue { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }
.tag-green { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }

.info-section { padding: 16px 18px; }
.info-row {
  display: flex; justify-content: space-between;
  padding: 7px 0; border-bottom: 1px dashed var(--border);
  font-size: 12px;
}
.info-row:last-child { border-bottom: none; }
.info-k { color: var(--ink3); flex-shrink: 0; }
.info-v { color: var(--ink); text-align: right; max-width: 60%; word-break: break-all; }

.profile-foot {
  padding: 14px 18px;
  text-align: center;
  background: #FFF2F2;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--red);
  font-weight: 500;
}
.profile-foot small { display: block; color: var(--ink3); font-weight: 400; margin-top: 4px; font-size: 11px; }

.main { display: flex; flex-direction: column; gap: 16px; min-width: 0; }

.top-header {
  background: linear-gradient(135deg, #E8636A 0%, #d4545c 100%);
  color: #fff;
  border-radius: 8px;
  padding: 18px 24px;
  display: flex; justify-content: space-between; align-items: center;
  box-shadow: 0 2px 8px rgba(232,99,106,0.15);
  position: sticky; top: 0;
  z-index: 100;
  overflow: hidden;
}
.top-header::before {
  content: ''; position: absolute; right: -50px; top: -50px;
  width: 200px; height: 200px; background: rgba(255,255,255,0.06); border-radius: 50%;
}
.top-header-left { display: flex; align-items: center; gap: 12px; position: relative; z-index: 1; }
.top-header-icon {
  width: 40px; height: 40px; background: rgba(255,255,255,0.2);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.top-header-title { font-size: 18px; font-weight: 600; }
.top-header-sub { font-size: 12px; opacity: 0.85; margin-top: 2px; }
.top-header-stats { display: flex; gap: 32px; position: relative; z-index: 1; }
.stat-item { text-align: center; }
.stat-num { font-size: 24px; font-weight: 700; line-height: 1.2; }
.stat-label { font-size: 11px; opacity: 0.9; margin-top: 2px; }
.stat-divider { width: 1px; background: rgba(255,255,255,0.3); align-self: stretch; }

.ai-block {
  background: var(--red-bg);
  border: 1px solid var(--red-border);
  border-left: 4px solid var(--red);
  border-radius: 8px;
  padding: 16px 20px;
  display: flex; align-items: flex-start; gap: 12px;
}
.ai-icon {
  width: 32px; height: 32px;
  background: var(--red); color: #fff;
  border-radius: 6px; display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; flex-shrink: 0;
}
.ai-content { flex: 1; }
.ai-title { font-size: 14px; font-weight: 600; color: var(--red); margin-bottom: 6px; }
.ai-text { font-size: 13px; color: var(--ink); line-height: 1.7; opacity: 0.85; }

.card {
  background: var(--white);
  border-radius: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  border: 1px solid var(--border);
  overflow: hidden;
}
.card-head {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.card-head::before {
  content: ''; width: 3px; height: 14px; background: var(--red); border-radius: 2px;
}
.card-title { font-size: 15px; font-weight: 600; color: var(--ink); }
.card-body { padding: 18px 20px; }
.empty-tip { text-align: center; color: var(--ink3); padding: 40px 0; font-size: 13px; }

.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.row-2.row-asym { grid-template-columns: 0.85fr 1.15fr; }
.row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

.timeline { position: relative; padding-left: 16px; }
.timeline::before {
  content: ''; position: absolute; left: 4px; top: 6px; bottom: 6px;
  width: 1.5px; background: var(--border);
}
.tl-item { position: relative; padding-bottom: 14px; }
.tl-item:last-child { padding-bottom: 0; }
.tl-item::before {
  content: ''; position: absolute; left: -16px; top: 4px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--white); border: 2px solid var(--ink3);
}
.tl-item.highlight::before { background: var(--red); border-color: var(--red); }
.tl-item.amber::before { background: var(--amber); border-color: var(--amber); }
.tl-item.blue::before { background: var(--blue); border-color: var(--blue); }
.tl-item.green::before { background: var(--green); border-color: var(--green); }
.tl-date { font-size: 11px; color: var(--ink3); margin-bottom: 2px; }
.tl-title { font-size: 13px; font-weight: 500; color: var(--ink); }
.tl-tag {
  display: inline-block; font-size: 10px; padding: 1px 7px;
  border-radius: 10px; margin-right: 4px; font-weight: 500;
}
.tl-tag-red { background: var(--red-bg); color: var(--red); }
.tl-tag-amber { background: var(--amber-bg); color: var(--amber); }
.tl-tag-blue { background: var(--blue-bg); color: var(--blue); }
.tl-tag-green { background: var(--green-bg); color: var(--green); }
.tl-org { font-size: 12px; color: var(--ink2); margin-top: 3px; }

.radar-wrap { display: grid; grid-template-columns: 240px 1fr; gap: 20px; align-items: start; }
#radarChart { width: 240px; height: 240px; }
.cloud-area { position: relative; height: 280px; width: 100%; }
.wc {
  position: absolute;
  white-space: nowrap;
  font-weight: 600;
  line-height: 1;
  cursor: default;
  transition: transform .2s;
  user-select: none;
  transform: translate(-50%, -50%);
}
.wc:hover { transform: translate(-50%, -50%) scale(1.08); z-index: 10; }

.eval-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.eval-chip {
  font-size: 11px; padding: 3px 10px; border-radius: 4px;
  background: var(--bg2); border: 1px solid var(--border);
}
.eval-chip .k { color: var(--ink2); }
.eval-chip .v { color: var(--red); font-weight: 600; margin-left: 3px; }
.eval-chip .v.good { color: var(--green); }

.deficit-title { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 10px; }
.deficit-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 10px 12px; margin-bottom: 8px;
  background: var(--red-bg); border-radius: 6px;
  border-left: 3px solid var(--red);
}
.deficit-cat {
  font-size: 11px; font-weight: 600; padding: 2px 8px;
  background: var(--red); color: #fff; border-radius: 3px;
  flex-shrink: 0;
}
.deficit-text { font-size: 12px; color: var(--ink); flex: 1; opacity: 0.85; }

#relCanvas { width: 100%; height: 320px; display: block; }
.rel-legend { display: flex; gap: 14px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }
.rel-legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--ink2); }
.rel-legend-dot { width: 8px; height: 8px; border-radius: 50%; }

.growth-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.growth-timeline { position: relative; padding-left: 16px; }
.growth-timeline::before {
  content: ''; position: absolute; left: 5px; top: 6px; bottom: 6px;
  width: 2px; background: var(--bg2);
}
.gt-item { position: relative; padding-bottom: 14px; }
.gt-item:last-child { padding-bottom: 0; }
.gt-item::before {
  content: ''; position: absolute; left: -15px; top: 4px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--ink3); border: 2px solid #fff;
  box-shadow: 0 0 0 2px var(--ink3);
}
.gt-item.fast::before { background: var(--green); box-shadow: 0 0 0 2px var(--green); }
.gt-item.pressure::before { background: var(--red); box-shadow: 0 0 0 2px var(--red); }
.gt-stage {
  display: inline-block; font-size: 12px; font-weight: 600;
  color: var(--ink); margin-bottom: 4px;
}
.gt-tags { display: inline-flex; gap: 4px; margin-left: 6px; }
.gt-tag { font-size: 10px; padding: 1px 7px; border-radius: 10px; font-weight: 500; }
.gt-tag-fast { background: var(--green-bg); color: var(--green); }
.gt-tag-pressure { background: var(--red-bg); color: var(--red); }
.gt-period { font-size: 11px; color: var(--ink3); margin-bottom: 4px; }
.gt-desc { font-size: 12px; color: var(--ink2); line-height: 1.5; }

.summary-block {
  background: var(--bg2); border-radius: 6px; padding: 14px;
  border: 1px solid var(--border);
}
.summary-title { font-size: 13px; font-weight: 600; color: var(--red); margin-bottom: 10px; }
.summary-list { list-style: none; }
.summary-list li {
  font-size: 12px; color: var(--ink); line-height: 1.7; opacity: 0.85;
  padding-left: 14px; position: relative; margin-bottom: 6px;
}
.summary-list li::before {
  content: '•'; position: absolute; left: 4px; color: var(--red); font-weight: 700;
}
.summary-list b { color: var(--ink); }

.merit-list { display: flex; flex-direction: column; gap: 10px; }
.merit-card {
  background: var(--white); border: 1px solid var(--border); border-radius: 6px;
  padding: 12px 14px; transition: all .2s;
}
.merit-card:hover { border-color: var(--red); box-shadow: 0 2px 8px rgba(232,99,106,0.08); }
.merit-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; gap: 8px; }
.merit-name { font-size: 13px; font-weight: 600; color: var(--ink); }
.merit-level { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 3px; flex-shrink: 0; }
.level-high { background: var(--red); color: #fff; }
.level-good { background: var(--blue); color: #fff; }
.merit-desc { font-size: 12px; color: var(--ink2); line-height: 1.6; }

.award-section { margin-top: 16px; padding-top: 14px; border-top: 1px dashed var(--border); }
.award-title { font-size: 12px; font-weight: 600; color: var(--ink3); margin-bottom: 8px; }
.award-list { display: flex; flex-direction: column; gap: 5px; }
.award-item { font-size: 12px; color: var(--ink2); display: flex; align-items: center; gap: 6px; }
.award-year { color: var(--ink3); min-width: 50px; }
.award-name { flex: 1; }
.award-badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: var(--amber-bg); color: var(--amber); }
.award-badge.green { background: var(--green-bg); color: var(--green); }

.risk-list { display: flex; flex-direction: column; gap: 8px; }
.risk-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; border-radius: 6px;
  border-left: 3px solid;
}
.risk-item.warn { background: var(--amber-bg); border-left-color: var(--amber); }
.risk-item.normal { background: var(--green-bg); border-left-color: var(--green); }
.risk-item.danger { background: var(--red-bg); border-left-color: var(--red); }
.risk-icon {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0; color: #fff;
}
.risk-item.warn .risk-icon { background: var(--amber); }
.risk-item.normal .risk-icon { background: var(--green); }
.risk-item.danger .risk-icon { background: var(--red); }
.risk-content { flex: 1; }
.risk-head { display: flex; justify-content: space-between; align-items: center; }
.risk-name { font-size: 13px; font-weight: 600; }
.risk-item.warn .risk-name { color: var(--amber); }
.risk-item.normal .risk-name { color: var(--green); }
.risk-item.danger .risk-name { color: var(--red); }
.risk-status { font-size: 10px; font-weight: 600; padding: 1px 7px; border-radius: 3px; background: var(--amber); color: #fff; }
.risk-status.normal { background: var(--green); }
.risk-status.danger { background: var(--red); }
.risk-desc { font-size: 11px; color: var(--ink3); margin-top: 3px; }

.train-block { margin-bottom: 14px; }
.train-title { font-size: 12px; font-weight: 600; color: var(--red); margin-bottom: 8px; }
.train-list { padding-left: 18px; }
.train-list li { font-size: 12px; color: var(--ink2); line-height: 1.8; }
.train-list li::marker { color: var(--red); }
.train-list b { color: var(--ink); }

.post-block { margin-bottom: 14px; }
.post-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.post-tag { font-size: 12px; padding: 4px 10px; border-radius: 4px; background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

.edu-block { }
.edu-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.edu-tag { font-size: 12px; padding: 4px 10px; border-radius: 4px; background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.ai-btn {
  position: fixed; bottom: 28px; right: 28px; z-index: 999;
  width: 58px; height: 58px; border-radius: 50%;
  background: linear-gradient(135deg, #E8636A 0%, #d4545c 100%);
  color: #fff; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; box-shadow: 0 6px 20px rgba(232,99,106,0.4);
  transition: transform .2s, box-shadow .2s;
}
.ai-btn:hover { transform: scale(1.08); box-shadow: 0 8px 24px rgba(232,99,106,0.5); }
.ai-btn-label {
  position: absolute; bottom: 70px; right: 0;
  background: var(--ink); color: #fff;
  font-size: 11px; padding: 3px 8px; border-radius: 4px;
  white-space: nowrap; opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.ai-btn:hover .ai-btn-label { opacity: 1; }
.ai-pulse {
  position: absolute; top: 4px; right: 4px;
  width: 10px; height: 10px; border-radius: 50%;
  background: #2E7D32; border: 2px solid #fff;
}

.ai-dialog {
  position: fixed; bottom: 100px; right: 28px; z-index: 998;
  width: 380px; height: 520px;
  background: var(--white); border-radius: 12px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.15); border: 1px solid var(--border);
  display: none; flex-direction: column; overflow: hidden;
  animation: slideUp .25s ease;
}
.ai-dialog.open { display: flex; }
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.ai-dialog-head {
  background: linear-gradient(135deg, #E8636A 0%, #d4545c 100%);
  color: #fff; padding: 14px 18px;
  display: flex; align-items: center; justify-content: space-between;
}
.ai-head-left { display: flex; align-items: center; gap: 10px; }
.ai-head-avatar {
  width: 36px; height: 36px; background: rgba(255,255,255,0.2);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.ai-head-name { font-size: 15px; font-weight: 600; }
.ai-head-status { font-size: 11px; opacity: 0.85; display: flex; align-items: center; gap: 4px; }
.ai-head-status::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: #69F0AE;
}
.ai-dialog-close {
  background: none; border: none; color: rgba(255,255,255,0.7);
  cursor: pointer; font-size: 18px; padding: 0; line-height: 1;
  width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
  border-radius: 4px;
}
.ai-dialog-close:hover { color: #fff; background: rgba(255,255,255,0.15); }

.ai-dialog-body {
  padding: 16px 18px; overflow-y: auto; flex: 1;
  display: flex; flex-direction: column; gap: 10px;
  background: var(--bg);
}
.ai-welcome {
  font-size: 12px; color: var(--ink); line-height: 1.6;
  padding: 12px 14px; background: var(--white);
  border: 1px solid var(--border); border-radius: 8px;
  position: relative;
}
.ai-welcome::before {
  content: ''; position: absolute; left: -6px; top: 12px;
  width: 10px; height: 10px; background: var(--white);
  border-left: 1px solid var(--border); border-bottom: 1px solid var(--border);
  transform: rotate(45deg);
}
.ai-suggest-title {
  font-size: 11px; color: var(--ink3); margin: 6px 0 4px;
  display: flex; align-items: center; gap: 6px;
}
.ai-suggest-title::before, .ai-suggest-title::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.ai-suggest-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; text-align: left;
  padding: 9px 12px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--white);
  font-size: 12px; color: var(--ink); cursor: pointer;
  font-family: inherit; transition: all .15s;
}
.ai-suggest-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }
.ai-suggest-icon { color: var(--red); font-size: 13px; }

.ai-chat-area { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
.ai-msg {
  font-size: 12px; line-height: 1.6; padding: 9px 12px;
  border-radius: 10px; max-width: 85%; word-wrap: break-word;
}
.ai-msg.bot {
  background: var(--white); color: var(--ink);
  align-self: flex-start; border-bottom-left-radius: 4px;
  border: 1px solid var(--border);
}
.ai-msg.user {
  background: var(--red); color: #fff;
  align-self: flex-end; border-bottom-right-radius: 4px;
}

.ai-input-row {
  display: flex; gap: 8px; padding: 12px 14px;
  border-top: 1px solid var(--border); background: var(--white);
}
.ai-input-row input {
  flex: 1; border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 12px; font-size: 12px; outline: none;
  font-family: inherit; background: var(--bg);
  transition: border-color .15s;
}
.ai-input-row input:focus { border-color: var(--red); background: #fff; }
.ai-input-row button {
  background: var(--red); color: #fff; border: none;
  border-radius: 8px; padding: 0 16px; cursor: pointer;
  font-size: 12px; font-family: inherit; font-weight: 500;
  transition: opacity .15s;
}
.ai-input-row button:hover { opacity: .9; }
</style>
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="输入干部编号..." onkeydown="if(event.key==='Enter')doSearch()">
      <button onclick="doSearch()">查询</button>
    </div>

    <div class="profile-head">
      <div class="avatar">👤</div>
      <div class="profile-id" id="profileId">—</div>
      <div class="profile-title" id="profileTitle">—</div>
      <span class="profile-rank" id="profileRank">—</span>
    </div>

    <div class="tag-section">
      <div class="tag-row" id="tagRow"></div>
    </div>

    <div class="info-section" id="infoSection"></div>

    <div class="profile-foot">
      干部画像分析系统
      <small id="profileFootSub">数据更新：—</small>
    </div>
  </aside>

  <main class="main" id="mainContent">
    <div class="card"><div class="card-body empty-tip">加载中…</div></div>
  </main>
</div>

<button class="ai-btn" onclick="toggleAI()" title="朝鉴知贤">
  <span class="ai-btn-label">朝鉴知贤</span>
  <span class="ai-pulse"></span>
  🤖
</button>

<div class="ai-dialog" id="aiDialog">
  <div class="ai-dialog-head">
    <div class="ai-head-left">
      <div class="ai-head-avatar">🤖</div>
      <div>
        <div class="ai-head-name">朝鉴知贤</div>
        <div class="ai-head-status">在线服务中</div>
      </div>
    </div>
    <button class="ai-dialog-close" onclick="toggleAI()">✕</button>
  </div>
  <div class="ai-dialog-body" id="aiBody">
    <div class="ai-welcome">您好！我是<strong>朝鉴知贤</strong>，可为您提供班子画像、岗位匹配、成长分析等智能问询服务。</div>
    <div class="ai-suggest-title">高频对话</div>
    <button class="ai-suggest-btn" onclick="quickChat('查看所在班子画像')"><span class="ai-suggest-icon">▸</span>查看所在班子画像</button>
    <button class="ai-suggest-btn" onclick="quickChat('查看同岗位干部画像')"><span class="ai-suggest-icon">▸</span>查看同岗位干部画像</button>
    <button class="ai-suggest-btn" onclick="quickChat('生成班子搭配建议')"><span class="ai-suggest-icon">▸</span>生成班子搭配建议</button>
    <button class="ai-suggest-btn" onclick="quickChat('查看近三年成长趋势')"><span class="ai-suggest-icon">▸</span>查看近三年成长趋势</button>
    <div class="ai-chat-area" id="aiChat"></div>
  </div>
  <div class="ai-input-row">
    <input type="text" id="aiInput" placeholder="输入您的问题…" onkeydown="if(event.key==='Enter')sendMsg()">
    <button onclick="sendMsg()">发送</button>
  </div>
</div>

<script>
function v(obj, key, fallback) {
  const val = obj?.[key];
  if (val === null || val === undefined || val === "" || val === "null") return fallback ?? "—";
  return String(val);
}
function has(obj, key) {
  const val = obj?.[key];
  return val !== null && val !== undefined && val !== "" && val !== "null";
}
let missingFields = [];
function M(field) { missingFields.push(field); return "—"; }
function parseYear(s) {
  if (!s) return null;
  const m = String(s).match(/(\d{4})/);
  return m ? parseInt(m[1]) : null;
}
function getAge(c) { const y = parseYear(c.birth_date); return y ? 2026 - y : null; }
function getTenureYears(app) {
  if (!app || !app.period) return 0;
  const m = String(app.period).match(/(\d{4})/);
  return m ? Math.max(0, 2026 - parseInt(m[1])) : 0;
}
function todayCN() { return new Date().toLocaleDateString("zh-CN"); }

let currentCadreId = '001';
let currentData = null;
let radarChart = null;

function doSearch() {
  const v0 = document.getElementById('searchInput').value.trim();
  loadCadre(v0 || '001');
}

async function loadCadre(id) {
  currentCadreId = id;
  document.getElementById('searchInput').value = id;
  const main = document.getElementById('mainContent');
  main.innerHTML = '<div class="card"><div class="card-body empty-tip">加载中…</div></div>';
  try {
    const res = await fetch(`/api/cadre/${id}`);
    if (!res.ok) {
      main.innerHTML = `<div class="card"><div class="card-body empty-tip">干部 ${id} 未找到</div></div>`;
      resetSidebar();
      return;
    }
    currentData = await res.json();
    render(currentData);
  } catch (e) {
    main.innerHTML = `<div class="card"><div class="card-body empty-tip" style="color:var(--red)">API 连接失败: ${e.message}<br><small style="color:var(--ink3)">请确认服务器已启动</small></div></div>`;
  }
}

function resetSidebar() {
  document.getElementById('profileId').textContent = '—';
  document.getElementById('profileTitle').textContent = '—';
  document.getElementById('profileRank').textContent = '—';
  document.getElementById('tagRow').innerHTML = '';
  document.getElementById('infoSection').innerHTML = '';
  document.getElementById('profileFootSub').textContent = '数据更新：' + todayCN();
}

function render(data) {
  missingFields = [];
  const c = data.cadre || {};
  const edu = data.educations || [];
  const fam = data.relatives || [];
  const apps = data.resumes || [];
  const assess = data.annual_assessments || [];
  const abtags = data.abilities || [];
  const tags = data.tags || [];
  const pers = data.personalities || [];
  const scs = data.shortcomings || [];
  const ffs = data.familiar_fields || [];
  const pss = data.position_statuses || [];
  const perfs = data.performances || [];

  const highest = edu[0];
  const curApp = apps.length > 0 ? apps[apps.length - 1] : null;
  const curPos = pss.length > 0 ? pss[0].current_position : '';
  const curRank = curApp ? (curApp.rank || '—') : '—';
  const age = getAge(c);
  const tenureYears = getTenureYears(curApp);

  document.getElementById('profileId').textContent = v(c, 'cadre_id', M('cadre_id'));
  document.getElementById('profileTitle').textContent = curPos || v(c, 'name', '—');
  document.getElementById('profileRank').textContent = curRank;
  document.getElementById('profileFootSub').textContent = '数据更新：' + todayCN();

  const tagRow = document.getElementById('tagRow');
  if (abtags.length > 0) {
    tagRow.innerHTML = abtags.map((t, i) => {
      const cls = i % 3 === 0 ? 'tag-red' : (i % 3 === 1 ? 'tag-blue' : 'tag-green');
      return `<span class="tag ${cls}">${v(t, 'ability_trait', '')}</span>`;
    }).join('');
  } else {
    tagRow.innerHTML = '<span style="color:var(--ink3);font-size:12px">暂无能力标签</span>';
  }

  const eduFull = highest ? `${v(highest, 'edu_level', '')}·${v(highest, 'degree', '')}` : '—';
  if (highest && highest.school) document.getElementById('infoSection').dataset.school = highest.school;

  document.getElementById('infoSection').innerHTML = `
    <div class="info-row"><span class="info-k">性别</span><span class="info-v">${v(c, 'gender', M('gender'))}</span></div>
    <div class="info-row"><span class="info-k">民族</span><span class="info-v">${v(c, 'ethnicity', M('ethnicity'))}</span></div>
    <div class="info-row"><span class="info-k">出生年月</span><span class="info-v">${v(c, 'birth_date', M('birth_date'))}${age !== null ? '（' + age + '岁）' : ''}</span></div>
    <div class="info-row"><span class="info-k">政治面貌</span><span class="info-v">${v(c, 'political_status', M('political_status'))}</span></div>
    <div class="info-row"><span class="info-k">入党时间</span><span class="info-v">${v(c, 'party_join_date', M('party_join_date'))}</span></div>
    <div class="info-row"><span class="info-k">参加工作</span><span class="info-v">${v(c, 'work_start_date', M('work_start_date'))}</span></div>
    <div class="info-row"><span class="info-k">籍贯</span><span class="info-v">${v(c, 'native_place', M('native_place'))}</span></div>
    <div class="info-row"><span class="info-k">出生地</span><span class="info-v">${v(c, 'birth_place', M('birth_place'))}</span></div>
    <div class="info-row"><span class="info-k">学历学位</span><span class="info-v">${eduFull}</span></div>
    <div class="info-row"><span class="info-k">健康状况</span><span class="info-v">${v(c, 'health_status', M('health_status'))}</span></div>
    <div class="info-row"><span class="info-k">专业技术职务</span><span class="info-v">${v(c, 'tech_title', M('tech_title'))}</span></div>
    <div class="info-row"><span class="info-k">熟悉专长</span><span class="info-v">${v(c, 'specialty', M('specialty'))}</span></div>
  `;

  document.getElementById('mainContent').innerHTML = `
    ${buildTopHeader(c, curApp, tags, pss, ffs)}
    ${buildAIBlock(c, abtags, apps, pss)}
    ${buildRow1(apps, abtags, tags, scs)}
    ${buildRow2(fam, apps, abtags, pers)}
    ${buildRow3(perfs, scs, abtags, c, age, apps)}
  `;

  setTimeout(() => {
    initRadarChart(abtags);
    drawRelGraph(fam, c);
  }, 50);
}

function buildTopHeader(c, curApp, tags, pss, ffs) {
  const rank = curApp ? (curApp.rank || '') : '';
  const posName = pss.length > 0 ? pss[0].current_position : '';
  const posShort = posName.length > 14 ? posName.substring(0, 14) + '…' : posName;
  const tagStr = tags.length > 0 ? tags.map(t => v(t, 'style_tag', '')).filter(t => t && t !== '—').slice(0, 3).join('·') : '';
  return `
    <div class="top-header">
      <div class="top-header-left">
        <div class="top-header-icon">👤</div>
        <div>
          <div class="top-header-title">${posShort || '干部画像'}</div>
          <div class="top-header-sub">数据更新：${todayCN()}</div>
        </div>
      </div>
      <div class="top-header-stats">
        <div class="stat-item">
          <div class="stat-num">${rank}</div>
          <div class="stat-label">职级</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-num">${tagStr || '—'}</div>
          <div class="stat-label">结构标签</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-num">${ffs.length}</div>
          <div class="stat-label">熟悉领域</div>
        </div>
      </div>
    </div>
  `;
}

function buildAIBlock(c, abtags, apps, pss) {
  const traitNames = abtags.map(t => v(t, 'ability_trait', '')).filter(t => t && t !== '—').slice(0, 3);
  const position = pss.length > 0 ? pss[0].current_position : '相关职务';
  const posShort = position.length > 22 ? position.substring(0, 22) + '…' : position;
  const tagStr = traitNames.length > 0 ? traitNames.join('、') : '相关业务能力';
  const streetExp = apps.filter(a => /街|乡|镇/.test(v(a, 'position', ''))).length;
  let summary = `现任${posShort}，具备${tagStr}等能力特征。`;
  if (streetExp > 0) summary += `具有${streetExp}段街乡基层经历，`;
  summary += '成长路径清晰，岗位匹配度较高。';
  return `
    <div class="ai-block">
      <div class="ai-icon">AI</div>
      <div class="ai-content">
        <div class="ai-title">AI 智能研判</div>
        <div class="ai-text">${summary}</div>
      </div>
    </div>
  `;
}

function buildRow1(apps, abtags, tags, scs) {
  return `
    <div class="row-2 row-asym">
      ${buildResumesCard(apps)}
      ${buildAbilityCard(abtags, tags, scs)}
    </div>
  `;
}

function buildResumesCard(apps) {
  if (apps.length === 0) {
    return `<div class="card"><div class="card-head"><div class="card-title">📋 任职经历</div></div><div class="card-body empty-tip">暂无任职记录</div></div>`;
  }
  const sorted = [...apps].reverse();

  return `
    <div class="card">
      <div class="card-head"><div class="card-title">📋 任职经历</div></div>
      <div class="card-body">
        <div class="timeline">
          ${sorted.map((a, i) => {
            const period = v(a, 'period', '');
            const position = v(a, 'position', '');
            const unit = v(a, 'unit', '');
            const isCur = period.includes('至今');
            const isStreet = /街|乡|镇/.test(unit);
            const isYiban = /书记|主任/.test(position);
            const cls = isCur ? (isYiban ? 'highlight' : 'blue') : (isStreet ? 'green' : '');
            const tagsHtml = [];
            if (isCur && isYiban) tagsHtml.push('<span class="tl-tag tl-tag-red">一把手</span>');
            else if (isCur) tagsHtml.push('<span class="tl-tag tl-tag-blue">现任</span>');
            if (isStreet) tagsHtml.push('<span class="tl-tag tl-tag-green">街乡</span>');
            return `
              <div class="tl-item ${cls}">
                <div class="tl-date">${period}</div>
                <div class="tl-title">${position}${tagsHtml.join('')}</div>
                <div class="tl-org">${unit}</div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    </div>
  `;
}

function buildAbilityCard(abtags, tags, scs) {
  const positions = [
    {left: 6, top: 18}, {left: 33, top: 6}, {left: 88, top: 4}, {left: 8, top: 38},
    {left: 24, top: 26}, {left: 78, top: 22}, {left: 48, top: 32}, {left: 62, top: 22},
    {left: 88, top: 32}, {left: 20, top: 58}, {left: 42, top: 54}, {left: 90, top: 50},
    {left: 22, top: 78}, {left: 6, top: 78}, {left: 40, top: 80}, {left: 62, top: 78},
    {left: 88, top: 78}, {left: 50, top: 94}, {left: 62, top: 96}, {left: 84, top: 96}
  ];
  const colorPool = ['#E8636A', '#3F51B5', '#F57F17', '#2E7D32', '#7B1FA2', '#E91E63'];
  const items = abtags.slice(0, 20);

  const cloudHtml = items.length > 0
    ? items.map((t, i) => {
        const pos = positions[i % positions.length];
        const fontSize = 13 + i % 8;
        const color = colorPool[i % colorPool.length];
        const label = v(t, 'ability_trait', '').substring(0, 6);
        return `<span class="wc" style="left:${pos.left}%;top:${pos.top}%;font-size:${fontSize}px;color:${color};">${label}</span>`;
      }).join('')
    : '<div style="text-align:center;color:var(--ink3);padding:60px 0;">暂无能力标签数据</div>';

  const dims = ['调查研究能力', '科学决策能力', '改革攻坚能力', '应急处突能力', '群众工作能力', '抓落实能力'];
  const baseScores = [78, 90, 88, 80, 82, 92];

  const evalChips = dims.map((d, i) => {
    const isGood = baseScores[i] >= 85;
    const val = isGood ? '优秀' : '良好';
    return `<span class="eval-chip"><span class="k">${d}:</span><span class="v ${isGood ? 'good' : ''}">${val}</span></span>`;
  }).join('');

  let deficitHtml;
  if (scs.length > 0) {
    deficitHtml = scs.map(s => {
      return `<div class="deficit-item"><span class="deficit-cat">不足</span><span class="deficit-text">${v(s, 'content', '')}</span></div>`;
    }).join('');
  } else {
    deficitHtml = `
      <div class="deficit-item"><span class="deficit-cat">能力类</span><span class="deficit-text">暂未记录主要不足</span></div>
    `;
  }

  return `
    <div class="card">
      <div class="card-head"><div class="card-title">🎯 能力素质与评价</div></div>
      <div class="card-body">
        <div class="radar-wrap">
          <div id="radarChart"></div>
          <div class="cloud-area">${cloudHtml}</div>
        </div>
        <div class="eval-row">${evalChips}</div>
        <div style="margin-top: 18px;">
          <div class="deficit-title">主要短板</div>
          ${deficitHtml}
        </div>
      </div>
    </div>
  `;
}

function buildRow2(fam, apps, abtags, pers) {
  return `
    <div class="row-2">
      ${buildRelCard()}
      ${buildGrowthCard(apps, abtags, pers)}
    </div>
  `;
}

function buildRelCard() {
  return `
    <div class="card">
      <div class="card-head"><div class="card-title">🔗 关系图谱</div></div>
      <div class="card-body">
        <canvas id="relCanvas" width="600" height="320" style="width:100%;height:320px;"></canvas>
        <div class="rel-legend">
          <div class="rel-legend-item"><span class="rel-legend-dot" style="background:var(--red);"></span>配偶</div>
          <div class="rel-legend-item"><span class="rel-legend-dot" style="background:var(--amber);"></span>子女</div>
          <div class="rel-legend-item"><span class="rel-legend-dot" style="background:var(--blue);"></span>父母</div>
          <div class="rel-legend-item"><span class="rel-legend-dot" style="background:var(--green);"></span>同事</div>
          <div class="rel-legend-item"><span class="rel-legend-dot" style="background:#7B1FA2;"></span>其他</div>
        </div>
      </div>
    </div>
  `;
}

function buildGrowthCard(apps, abtags, pers) {
  const sorted = [...apps];

  let stages = [];
  if (sorted.length === 0) {
    stages = [{stage: '暂无数据', period: '—', desc: '暂未获取到任职经历', tags: []}];
  } else {
    const n = sorted.length;
    const groupSize = Math.max(1, Math.ceil(n / 3));
    const stageNames = ['单点执行', '多线统筹', '体系构建'];
    for (let i = 0; i < 3; i++) {
      const group = sorted.slice(i * groupSize, (i + 1) * groupSize);
      if (group.length === 0) continue;
      const firstApp = group[0];
      const lastApp = group[group.length - 1];
      stages.push({
        stage: stageNames[i] || `阶段 ${i+1}`,
        period: v(firstApp, 'period', '?') + ' ~ ' + v(lastApp, 'period', '?'),
        desc: group.map(g => v(g, 'position', '')).join('、'),
        tags: i >= 1 ? [{type: 'fast', label: '快'}] : []
      });
    }
  }

  const persStr = pers.length > 0 ? pers.map(p => v(p, 'trait', '')).filter(t => t && t !== '—').join('；') : '';
  const evos = (currentData && currentData.ability_evolutions) || [];
  const evoStr = evos.length > 0 ? evos.map(e => v(e, 'ability_structure', '')).join('；') : '';

  const stageHtml = stages.map((s, i) => {
    const cls = i === stages.length - 1 ? 'fast' : '';
    const tagsHtml = s.tags.map(t => `<span class="gt-tag gt-tag-${t.type}">${t.label}</span>`).join('');
    return `
      <div class="gt-item ${cls}">
        <div class="gt-stage">${s.stage}</div>
        <div class="gt-tags">${tagsHtml}</div>
        <div class="gt-period">${s.period}</div>
        <div class="gt-desc">${s.desc}</div>
      </div>
    `;
  }).join('');

  return `
    <div class="card">
      <div class="card-head">
        <div class="card-title">📈 成长轨迹分析</div>
        <div style="margin-left:auto;display:flex;gap:12px;font-size:11px;color:var(--ink2);">
          <span>● <span style="color:var(--green);">快于均值</span></span>
          <span>● <span style="color:var(--ink3);">正常</span></span>
        </div>
      </div>
      <div class="card-body">
        <div class="growth-row">
          <div class="growth-timeline">${stageHtml}</div>
          <div>
            <div class="summary-block">
              <div class="summary-title">成长特征总结</div>
              <ul class="summary-list">
                ${evoStr ? `<li><b>演变规律：</b>${evoStr}</li>` : ''}
                ${persStr ? `<li><b>性格特征：</b>${persStr}</li>` : ''}
                <li><b>待突破瓶颈：</b>战略谋划和数字化能力仍需加强</li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function buildRow3(perfs, scs, abtags, c, age, apps) {
  return `
    <div class="row-3">
      ${buildMeritCard(perfs, abtags)}
      ${buildRiskCard(c, age, apps)}
      ${buildTrainCard(abtags, c, apps)}
    </div>
  `;
}

function buildMeritCard(perfs, abtags) {
  let meritHtml = '';
  if (perfs.length > 0) {
    meritHtml = perfs.slice(0, 3).map(p => {
      const title = v(p, 'content', v(p, 'work_performance', '工作业绩'));
      const desc = v(p, 'work_experience', '') || v(p, 'work_performance', '');
      const source = v(p, 'source', '');
      const isHigh = source.includes('述职') || source.includes('考察');
      return `
        <div class="merit-card">
          <div class="merit-head">
            <div class="merit-name">${title.substring(0, 20)}</div>
            <span class="merit-level ${isHigh ? 'level-high' : 'level-good'}">${isHigh ? '突出' : '良好'}</span>
          </div>
          <div class="merit-desc">${desc.substring(0, 60)}</div>
        </div>
      `;
    }).join('');
  } else {
    meritHtml = '<div class="merit-card"><div class="merit-head"><div class="merit-name">暂无工作业绩记录</div></div></div>';
  }

  let awardHtml = '';
  const rps = (currentData && currentData.reward_punishes) || [];
  if (rps.length > 0) {
    awardHtml = rps.map(r => {
      const time = v(r, 'time', '—');
      const content = v(r, 'content', '—');
      return `<div class="award-item"><span class="award-year">${time}</span><span class="award-name">${content}</span><span class="award-badge green">奖励</span></div>`;
    }).join('');
  } else {
    awardHtml = '<div class="award-item"><span class="award-year">—</span><span class="award-name">暂无奖惩记录</span></div>';
  }

  return `
    <div class="card">
      <div class="card-head"><div class="card-title">🏆 工作实绩与成效</div></div>
      <div class="card-body">
        <div class="merit-list">${meritHtml}</div>
        <div class="award-section">
          <div>
            <div class="award-title">奖惩记录</div>
            <div class="award-list">${awardHtml}</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function buildRiskCard(c, age, apps) {
  const curApp = apps.length > 0 ? apps[apps.length - 1] : null;
  const period = curApp ? v(curApp, 'period', '') : '';
  const startMatch = period.match(/(\d{4})/);
  const startYear = startMatch ? parseInt(startMatch[1]) : null;
  const tenure = startYear ? Math.max(0, 2026 - startYear) : 0;
  const rank = curApp ? (curApp.rank || '') : '';

  const overStay = tenure >= 5 ? 'danger' : (tenure >= 4 ? 'warn' : 'normal');
  const overStayDesc = overStay === 'normal'
    ? '任职未超期'
    : `${rank || '现职'}岗位任职已${tenure}年，接近交流期限`;

  const retYears = age !== null ? Math.max(0, 60 - age) : null;
  const retStatus = retYears !== null && retYears <= 5 ? 'warn' : 'normal';
  const retDesc = retYears !== null ? `距法定退休年龄${retYears}年` : '出生日期未录入';

  return `
    <div class="card">
      <div class="card-head"><div class="card-title">⚠️ 风险预警</div></div>
      <div class="card-body">
        <div class="risk-list">
          <div class="risk-item ${overStay}">
            <div class="risk-icon">${overStay === 'normal' ? '✓' : '⚠'}</div>
            <div class="risk-content">
              <div class="risk-head">
                <div class="risk-name">任职超期</div>
                <span class="risk-status ${overStay}">${overStay === 'normal' ? '正常' : '预警'}</span>
              </div>
              <div class="risk-desc">${overStayDesc}</div>
            </div>
          </div>
          <div class="risk-item ${retStatus}">
            <div class="risk-icon">${retStatus === 'normal' ? '✓' : '⚠'}</div>
            <div class="risk-content">
              <div class="risk-head">
                <div class="risk-name">退休预警</div>
                <span class="risk-status ${retStatus}">${retStatus === 'normal' ? '正常' : '预警'}</span>
              </div>
              <div class="risk-desc">${retDesc}</div>
            </div>
          </div>
          <div class="risk-item normal">
            <div class="risk-icon">✓</div>
            <div class="risk-content">
              <div class="risk-head">
                <div class="risk-name">廉洁风险</div>
                <span class="risk-status normal">正常</span>
              </div>
              <div class="risk-desc">未发现廉洁风险</div>
            </div>
          </div>
          <div class="risk-item normal">
            <div class="risk-icon">✓</div>
            <div class="risk-content">
              <div class="risk-head">
                <div class="risk-name">到龄提醒</div>
                <span class="risk-status normal">—</span>
              </div>
              <div class="risk-desc">${v(c, 'retirement_date', '—')}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function buildTrainCard(abtags, c, apps) {
  const traits = abtags.map(t => v(t, 'ability_trait', '')).filter(t => t && t !== '—');
  const curApp = apps.length > 0 ? apps[apps.length - 1] : null;
  const curPos = curApp ? v(curApp, 'position', '—') : '—';
  const posShort = curPos.length > 12 ? curPos.substring(0, 12) + '…' : curPos;

  const trainItems = [];
  if (traits.length > 0) {
    trainItems.push(`政治素质过硬，${traits.slice(0, 2).join('、')}等能力突出`);
    trainItems.push('建议安排到相关业务部门轮岗锻炼');
    trainItems.push('建议参加中青年干部培训班');
  } else {
    trainItems.push('建议加强综合能力培养');
    trainItems.push('建议参加业务专题培训');
  }

  return `
    <div class="card">
      <div class="card-head"><div class="card-title">🎯 培养使用方向</div></div>
      <div class="card-body">
        <div class="train-block">
          <div class="train-title">培养建议</div>
          <ul class="train-list">
            ${trainItems.map(t => `<li>${t}</li>`).join('')}

        </div>
        <div class="post-block">
          <div class="train-title">拟任方向</div>
          <div class="post-tags">
            <span class="post-tag">${posShort}（留任）</span>
            <span class="post-tag">相关业务部门正职</span>
            <span class="post-tag">重点街乡党工委书记</span>
          </div>
        </div>
        <div class="edu-block">
          <div class="train-title">培训需求</div>
          <div class="edu-tags">
            <span class="edu-tag">综合能力提升培训</span>
            <span class="edu-tag">中青班系统培训</span>
            <span class="edu-tag">跨区域交流挂职</span>

        </div>
      </div>
    </div>
  `;
}

function initRadarChart(abtags) {
  const el = document.getElementById('radarChart');
  if (!el) return;

  let values = [78, 90, 88, 80, 82, 92];
  if (abtags.length > 0) {
    const base = 75 + abtags.length * 1.5;
    values = [78, 90, 88, 80, 82, 92].map(v => Math.max(55, Math.min(98, Math.round((base + v) / 2))));
  }

  if (radarChart) { try { radarChart.dispose(); } catch(e) {} }
  radarChart = echarts.init(el);
  radarChart.setOption({
    tooltip: { trigger: 'item' },
    radar: {
      indicator: [
        { name: '调查研究能力', max: 100 },
        { name: '科学决策能力', max: 100 },
        { name: '改革攻坚能力', max: 100 },
        { name: '应急处突能力', max: 100 },
        { name: '群众工作能力', max: 100 },
        { name: '抓落实能力', max: 100 }
      ],
      shape: 'polygon',
      radius: '65%',
      center: ['50%', '52%'],
      splitNumber: 4,
      axisName: { color: '#666666', fontSize: 11 },
      splitLine: { lineStyle: { color: '#DDDAD2' } },
      splitArea: {
        areaStyle: { color: ['rgba(255,255,255,0.3)', 'rgba(245,245,243,0.5)'] }
      },
      axisLine: { lineStyle: { color: '#DDDAD2' } }
    },
    series: [{
      type: 'radar',
      data: [{
        value: values,
        name: '能力评估',
        lineStyle: { color: '#E8636A', width: 2 },
        areaStyle: { color: 'rgba(232, 99, 106, 0.15)' },
        itemStyle: { color: '#E8636A' }
      }]
    }]
  });
}

function drawRelGraph(fam, c) {
  const canvas = document.getElementById('relCanvas');
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const cx = W / 2, cy = H / 2;

  ctx.clearRect(0, 0, W, H);

  const colorMap = {
    '配偶': { color: '#E8636A', bg: '#FFEBEE' },
    '妻子': { color: '#E8636A', bg: '#FFEBEE' },
    '丈夫': { color: '#E8636A', bg: '#FFEBEE' },
    '子': { color: '#F57F17', bg: '#FFF8E1' },
    '女': { color: '#F57F17', bg: '#FFF8E1' },
    '子女': { color: '#F57F17', bg: '#FFF8E1' },
    '父': { color: '#1565C0', bg: '#E3F2FD' },
    '母': { color: '#1565C0', bg: '#E3F2FD' },
    '父母': { color: '#1565C0', bg: '#E3F2FD' },
    '兄': { color: '#2E7D32', bg: '#E8F5E9' },
    '弟': { color: '#2E7D32', bg: '#E8F5E9' },
    '姐': { color: '#2E7D32', bg: '#E8F5E9' },
    '妹': { color: '#2E7D32', bg: '#E8F5E9' }
  };

  const nodes = [];
  if (fam && fam.length > 0) {
    const n = fam.length;
    const radius = Math.min(W, H) * 0.35;
    fam.forEach((p, i) => {
      const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
      const r = radius + (i % 2 === 0 ? 0 : -15);
      const x = cx + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);
      const rel = v(p, 'relation_type', '其他');
      const colorInfo = colorMap[rel] || { color: '#7B1FA2', bg: '#F3E5F5' };
      nodes.push({
        x, y,
        label: v(p, 'name', '—').substring(0, 4),
        sub: rel,
        color: colorInfo.color,
        bg: colorInfo.bg
      });
    });
  } else {
    ctx.fillStyle = '#999';
    ctx.font = '13px "PingFang SC", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('暂无家庭成员数据', cx, cy);
  }

  nodes.forEach(n => {
    ctx.beginPath();
    ctx.setLineDash([4, 3]);
    ctx.moveTo(cx, cy);
    ctx.lineTo(n.x, n.y);
    ctx.strokeStyle = '#DDDAD2';
    ctx.lineWidth = 1;
    ctx.stroke();
  });
  ctx.setLineDash([]);

  nodes.forEach(n => {
    ctx.beginPath();
    ctx.arc(n.x, n.y, 22, 0, Math.PI * 2);
    ctx.fillStyle = n.bg;
    ctx.fill();
    ctx.strokeStyle = n.color;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.fillStyle = n.color;
    ctx.font = '600 12px "PingFang SC", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(n.label, n.x, n.y - 2);

    ctx.fillStyle = '#999999';
    ctx.font = '10px "PingFang SC", sans-serif';
    ctx.fillText(n.sub.substring(0, 3), n.x, n.y + 10);
  });

  ctx.beginPath();
  ctx.arc(cx, cy, 32, 0, Math.PI * 2);
  ctx.fillStyle = '#E8636A';
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.fillStyle = '#fff';
  ctx.font = '700 16px "PingFang SC", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(v(c, 'cadre_id', '—'), cx, cy);
}

window.addEventListener('resize', () => {
  if (radarChart) radarChart.resize();
  if (currentData) drawRelGraph(currentData.relatives || [], currentData.cadre || {});
});

function toggleAI() {
  document.getElementById('aiDialog').classList.toggle('open');
}
function addMsg(text, role) {
  const chat = document.getElementById('aiChat');
  const div = document.createElement('div');
  div.className = 'ai-msg ' + role;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

  const dlg = document.getElementById('aiDialog');
  if (!dlg.classList.contains('open')) dlg.classList.add('open');
  addMsg(topic, 'user');
  setTimeout(() => {
    const name = v(currentData?.cadre || {}, 'cadre_id', '该干部');
    const replies = {
      '查看所在班子画像': `正在调取干部 ${name} 所在领导班子画像数据，包含岗位匹配度、分工合理性、决策效率等 12 项指标…`,
      '查看同岗位干部画像': `正在检索同岗位同级别干部（正处级）数据，可对比工作实绩、能力雷达及成长轨迹…`,
      '生成班子搭配建议': `基于当前班子结构与本次考察材料，建议补充 1 名数字化背景副职、1 名基层经验丰富的副书记，可提升班子的创新与执行能力…`,
      '查看近三年成长趋势': `正在生成干部 ${name} 近三年能力跃迁曲线：抓落实 ↑14%、改革攻坚 ↑9%、创新谋划 ↑5%；短板仍为前瞻战略与数字化能力。`,
    };
    addMsg(replies[topic] || '好的，正在为您查询' + topic + '相关信息，请稍候…', 'bot');
  }, 500);
}
function sendMsg() {
  const input = document.getElementById('aiInput');
  const text = input.value.trim();
  if (!text) return;
  addMsg(text, 'user');
  input.value = '';
  setTimeout(() => addMsg('已收到您的提问，正在分析处理中…', 'bot'), 500);
}
