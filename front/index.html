<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>朝阳区班干部智能化分析研判系统</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
:root{--bg:#F5F5F5;--white:#FFF;--ink:#1A1A1A;--ink2:#555;--ink3:#999;--red:#C41E2C;--red-l:#E8636A;--red-bg:#FFF0F0;--red-bd:#FFCDD2;--blue:#1565C0;--blue-bg:#E3F2FD;--blue-bd:#BBDEFB;--green:#2E7D32;--green-bg:#E8F5E9;--green-bd:#C8E6C9;--amber:#F57F17;--amber-bg:#FFF8E1;--purple:#7B1FA2;--purple-bg:#F3E5F5;--border:#E5E5E5;--border-lt:#F0F0F0;--radius:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:13px;line-height:1.6;min-width:1280px}
.sys-header{background:linear-gradient(135deg,#C41E2C,#A51A25);color:#fff;height:56px;padding:0 28px;display:flex;align-items:center}
.sys-header-inner{display:flex;align-items:center;justify-content:space-between;width:100%}
.sys-logo-area{display:flex;align-items:center;gap:12px}
.sys-logo{width:38px;height:38px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700}
.sys-title{font-size:18px;font-weight:600;letter-spacing:1px}
.sys-subtitle{font-size:11px;opacity:.8;margin-top:1px}
.sys-search{display:flex;background:rgba(255,255,255,.15);border-radius:6px;overflow:hidden}
.sys-search input{background:#fff;border:none;padding:8px 16px;font-size:13px;width:260px;outline:none;font-family:inherit;color:var(--ink)}
.sys-search input::placeholder{color:var(--ink3)}
.sys-search-btn{background:rgba(255,255,255,.25);border:none;color:#fff;padding:0 16px;cursor:pointer;font-size:15px}
.sys-search-btn:hover{background:rgba(255,255,255,.35)}
.tab-bar{background:#fff;border-bottom:1px solid var(--border);height:44px;padding:0 28px;display:flex;align-items:center}
.tab-bar-inner{display:flex;align-items:center;justify-content:space-between;width:100%}
.tab-bar-left{display:flex;align-items:center;gap:4px}
.tab-back{color:var(--ink3);font-size:13px;cursor:pointer;padding:8px 12px;text-decoration:none}
.tab-back:hover{color:var(--ink)}
.tab-items{display:flex;margin-left:8px}
.tab-item{padding:10px 20px;font-size:14px;color:var(--ink2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;text-decoration:none;user-select:none}
.tab-item:hover{color:var(--red-l)}
.tab-item.active{color:var(--red);border-bottom-color:var(--red);font-weight:600}
.tab-bar-right{display:flex;gap:10px}
.btn-rs{background:var(--red);color:#fff;border:none;padding:7px 18px;border-radius:4px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500}
.btn-rs:hover{opacity:.9}
.btn-ro{background:#fff;color:var(--red);border:1px solid var(--red);padding:7px 18px;border-radius:4px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500}
.btn-ro:hover{background:var(--red-bg)}
.page-layout{display:grid;grid-template-columns:280px 1fr;gap:16px;padding:16px 20px;min-height:calc(100vh - 100px)}
.main-area{display:flex;flex-direction:column;gap:16px;min-width:0}
.tab-pane{display:none}.tab-pane.active{display:flex;flex-direction:column;gap:16px}
.sidebar{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);height:fit-content;position:sticky;top:16px;overflow:hidden}
.sb-avatar{padding:24px 20px 14px;text-align:center}
.sb-avatar-img{width:80px;height:80px;background:#F0F0F0;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.sb-avatar-img svg{width:40px;height:40px;fill:#bbb}
.sb-avatar-id{font-size:22px;font-weight:700;color:var(--ink)}
.sb-position{padding:10px 16px 12px;font-size:13px;font-weight:500;text-align:center;color:var(--ink);line-height:1.5;border-bottom:1px solid var(--border-lt)}
.sb-info{padding:8px 16px 10px;border-bottom:1px solid var(--border-lt)}
.sb-info-grid{display:grid;grid-template-columns:auto 1fr;gap:4px 8px;font-size:12px}
.sb-info-k{color:var(--ink3);white-space:nowrap}.sb-info-v{color:var(--ink)}
.sb-info-full{grid-column:1/-1;font-size:12px;color:var(--ink2);padding-top:2px;line-height:1.5}
.sb-section{padding:12px 16px;border-bottom:1px solid var(--border-lt)}.sb-section:last-child{border-bottom:none}
.sb-section-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:8px;padding-left:8px;border-left:3px solid var(--red);display:flex;align-items:center;justify-content:space-between}
.sb-tags{display:flex;flex-wrap:wrap;gap:6px}
.sb-tag{font-size:11px;padding:3px 10px;border-radius:4px;font-weight:500}
.sb-tag-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.sb-tag-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.sb-tag-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.sb-edu-entry{padding:6px 0}.sb-edu-entry+.sb-edu-entry{border-top:1px dashed var(--border-lt)}
.sb-edu-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.sb-edu-school{font-size:13px;font-weight:600;color:var(--red)}
.sb-edu-badge{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:500;white-space:nowrap}
.sb-edu-badge.full,.sb-edu-badge.part{background:var(--red);color:#fff}
.sb-edu-detail{font-size:11px;color:var(--ink2);display:flex;justify-content:space-between}
.sb-rel-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;text-align:center}
.sb-rel-num{font-size:18px;font-weight:700;color:var(--ink)}.sb-rel-num em{font-style:normal;font-size:12px;font-weight:400;color:var(--ink2)}
.sb-rel-label{font-size:11px;color:var(--ink3);margin-top:2px}
.sb-attention-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sb-view-detail{font-size:12px;color:var(--ink2);cursor:pointer;text-decoration:underline}
.sb-attention-tags{display:flex;gap:6px;flex-wrap:wrap}
.sb-attention-tag{font-size:11px;padding:3px 10px;border-radius:3px;background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.card-head{padding:14px 20px;border-bottom:1px solid var(--border-lt);display:flex;align-items:center;gap:8px}
.card-head::before{content:'';width:3px;height:14px;background:var(--red);border-radius:2px;flex-shrink:0}
.card-title{font-size:15px;font-weight:600;color:var(--ink)}
.card-title-sub{font-size:12px;color:var(--ink3);font-weight:400;margin-left:6px}
.card-body{padding:16px 20px}
.sub-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:10px;padding-left:8px;border-left:3px solid var(--red)}
.quanxi-layout{display:grid;grid-template-columns:1.3fr .7fr;gap:16px}
.quanxi-col{display:flex;flex-direction:column;gap:16px}
.ai-summary-box{background:#F8F8F8;border-radius:6px;padding:12px 16px;font-size:13px;color:var(--ink2);line-height:1.7;margin-bottom:12px}
.ai-summary-box b{color:var(--ink);font-weight:600}
.bubble-legend{display:flex;gap:16px;margin-bottom:8px;flex-wrap:wrap}
.bubble-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink2)}
.bubble-legend-dot{width:10px;height:10px;border-radius:50%}
.bubble-chart-wrap{position:relative;width:100%;height:320px;overflow:hidden}
.bubble{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;text-align:center;font-weight:600;color:#fff;transform:translate(-50%,-50%);cursor:default;transition:transform .2s;line-height:1.2}
.bubble:hover{transform:translate(-50%,-50%) scale(1.08);z-index:10}
.radar-layout{display:grid;grid-template-columns:240px 1fr;gap:16px;align-items:start}
#radarChart{width:240px;height:240px}
.ability-match-text{font-size:12px;color:var(--ink2);line-height:1.8}
.ability-match-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:8px}
.career-tl{position:relative;padding-left:20px}
.career-tl::before{content:'';position:absolute;left:6px;top:6px;bottom:6px;width:2px;background:var(--border)}
.ct-item{position:relative;padding-bottom:16px}.ct-item:last-child{padding-bottom:0}
.ct-dot{position:absolute;left:-20px;top:4px;width:14px;height:14px;border-radius:50%;background:var(--border);border:3px solid #fff;box-shadow:0 0 0 1px var(--border)}
.ct-dot.active{background:var(--red);box-shadow:0 0 0 1px var(--red)}
.ct-rank-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;background:var(--red-bg);color:var(--red);font-weight:500;margin-bottom:3px}
.ct-duration{font-size:10px;color:var(--ink3);float:right;margin-top:2px}
.ct-pos{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px}
.ct-period{font-size:11px;color:var(--ink3)}.ct-period em{font-style:normal;color:var(--red);font-weight:500}
.ct-desc{font-size:12px;color:var(--ink2);margin-top:2px}
.ct-tags{margin-top:3px;display:flex;gap:4px;flex-wrap:wrap}
.ct-tag{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:500}
.ct-tag-red{background:var(--red);color:#fff}.ct-tag-blue{background:var(--blue-bg);color:var(--blue)}.ct-tag-green{background:var(--green-bg);color:var(--green)}.ct-tag-amber{background:var(--amber-bg);color:var(--amber)}
.kaohe-layout{display:grid;grid-template-columns:1fr 2fr;gap:16px}
.kaohe-col{display:flex;flex-direction:column;gap:16px}
#lineChart{width:100%;height:200px}
.chart-subtitle{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px;padding-left:8px;border-left:3px solid var(--red)}
.info-note{display:flex;align-items:flex-start;gap:6px;background:#F8F8F8;border-radius:6px;padding:8px 12px;font-size:12px;color:var(--ink2);margin-top:8px}
.info-note-icon{width:16px;height:16px;background:var(--ink3);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border-lt)}.stat-row:last-child{border-bottom:none}
.stat-row-label{font-size:13px;color:var(--ink)}
.stat-row-value{font-size:13px;font-weight:600;padding:2px 10px;border-radius:4px}
.stat-row-value.green{background:var(--green-bg);color:var(--green)}.stat-row-value.red{background:var(--red-bg);color:var(--red)}
.stat-row-note{font-size:12px;color:var(--ink3);padding:6px 0}
.assessment-section{margin-top:16px}
.assessment-header{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:8px;padding-left:8px;border-left:3px solid var(--red)}
.assessment-summary{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#F8F8F8;border-radius:6px;margin-bottom:8px}
.assessment-items{font-size:13px;color:var(--ink)}.assessment-items em{font-style:normal;color:var(--red);font-weight:600}
.assessment-link{font-size:12px;color:var(--ink2);cursor:pointer;text-decoration:underline}
.award-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px dashed var(--border-lt)}.award-item:last-child{border-bottom:none}
.award-badge{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:500}
.award-badge.province{background:var(--red-bg);color:var(--red)}.award-badge.city{background:var(--blue-bg);color:var(--blue)}
.award-text{font-size:13px;color:var(--ink);flex:1}.award-year{font-size:12px;color:var(--ink3)}
.perf-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px}
.perf-card{border:1px solid var(--border);border-radius:6px;padding:14px;position:relative;min-height:120px}
.perf-card-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px}
.perf-card-year{font-size:11px;color:var(--red);font-weight:500;margin-bottom:4px}
.perf-card-pos{font-size:11px;color:var(--red);margin-bottom:6px}
.perf-card-desc{font-size:12px;color:var(--ink2);line-height:1.6}
.perf-card-icon{position:absolute;bottom:10px;right:10px;width:24px;height:24px;border-radius:50%;background:#F0F0F0;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--ink3)}
.typical-area{display:grid;grid-template-columns:260px 1fr;gap:16px;align-items:start}
.circle-metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:8px 0}
.circle-metric{display:flex;flex-direction:column;align-items:center;justify-content:center}
.cm-ring{border-radius:50%;border:3px solid var(--red);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.cm-ring.lg{width:120px;height:120px}.cm-ring.md{width:100px;height:100px}.cm-ring.sm{width:90px;height:90px}
.cm-label{font-size:11px;color:var(--ink2);line-height:1.2}
.cm-value{font-size:22px;font-weight:700;color:var(--red);line-height:1.2}.cm-value small{font-size:13px;font-weight:400}
.cm-value-sm{font-size:16px}
.event-list{display:flex;flex-direction:column;gap:10px}
.event-card{border:1px solid var(--border);border-radius:6px;padding:12px 14px;position:relative}
.event-card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.event-card-title{font-size:13px;font-weight:600;color:var(--ink);flex:1}
.event-card-badge{font-size:10px;color:var(--red);font-weight:500;white-space:nowrap;margin-left:8px}
.event-card-pos{font-size:11px;color:var(--red);margin-bottom:3px}
.event-card-desc{font-size:12px;color:var(--ink2);line-height:1.5}
.event-card-year{font-size:11px;color:var(--ink3);margin-top:4px}
.event-card-icon{position:absolute;bottom:10px;right:10px;width:22px;height:22px;border-radius:50%;background:#F0F0F0;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--ink3)}
.ai成长-layout{display:grid;grid-template-columns:1fr 1.4fr;gap:16px}
.ai成长-col{display:flex;flex-direction:column;gap:16px}
.deficit-block{padding:12px 14px;margin-bottom:10px;border-radius:6px;border-left:4px solid}.deficit-block:last-child{margin-bottom:0}
.deficit-block.org{background:var(--red-bg);border-color:var(--red)}
.deficit-block.mass{background:var(--blue-bg);border-color:var(--blue)}
.deficit-block.self{background:var(--green-bg);border-color:var(--green)}
.deficit-badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:3px;color:#fff;margin-bottom:6px}
.deficit-badge.org{background:var(--red)}.deficit-badge.mass{background:var(--blue)}.deficit-badge.self{background:var(--green)}
.deficit-text{font-size:12px;color:var(--ink);line-height:1.7}
.penalty-section{margin-bottom:14px}.penalty-section:last-child{margin-bottom:0}
.penalty-header{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.penalty-title{font-size:13px;font-weight:600;color:var(--ink)}
.penalty-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;font-weight:500}
.penalty-badge.warn{background:var(--amber-bg);color:var(--amber)}.penalty-badge.danger{background:var(--red-bg);color:var(--red)}
.penalty-desc{font-size:12px;color:var(--ink2);line-height:1.6}
.penalty-year{font-size:11px;color:var(--ink3);text-align:right;margin-top:4px}
.growth-dual{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:16px}
.growth-col-title{font-size:13px;font-weight:600;margin-bottom:10px;padding:4px 10px;border-radius:4px;display:inline-block}
.growth-col-title.ability{background:var(--red-bg);color:var(--red)}.growth-col-title.style{background:var(--green-bg);color:var(--green)}
.growth-tl{position:relative;padding-left:16px}
.growth-tl::before{content:'';position:absolute;left:4px;top:6px;bottom:6px;width:2px;background:var(--border)}
.growth-tl-item{position:relative;padding-bottom:14px}.growth-tl-item:last-child{padding-bottom:0}
.growth-tl-dot{position:absolute;left:-16px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--ink3);border:2px solid #fff;box-shadow:0 0 0 1px var(--ink3)}
.growth-tl-dot.active{background:var(--red);box-shadow:0 0 0 1px var(--red)}
.growth-tl-period{font-size:10px;color:var(--red);font-weight:500;margin-bottom:2px}
.growth-tl-stage{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:2px}
.growth-tl-desc{font-size:12px;color:var(--ink2);line-height:1.5}
.comprehensive-box{background:#F8F8F8;border-radius:6px;padding:12px 16px;margin-bottom:12px}
.comprehensive-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.comprehensive-title::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--amber)}
.comprehensive-text{font-size:12px;color:var(--ink2);line-height:1.6}
.dev-table{width:100%;border-collapse:collapse;font-size:12px}
.dev-table th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);color:var(--ink3);font-weight:500}
.dev-table td{padding:8px 10px;border-bottom:1px solid var(--border-lt);color:var(--ink)}
.dev-table .pct{color:var(--red);font-weight:600}
.ai-fab{position:fixed;bottom:24px;right:24px;background:var(--red);color:#fff;border:none;padding:10px 18px;border-radius:20px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:500;box-shadow:0 4px 12px rgba(196,30,44,.3);z-index:200;display:flex;align-items:center;gap:6px}
.ai-fab:hover{opacity:.9}
.ai-dialog{position:fixed;bottom:80px;right:24px;width:360px;background:#fff;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.15);z-index:200;display:none;flex-direction:column;overflow:hidden}
.ai-dialog.open{display:flex}
.ai-dialog-head{background:var(--red);color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
.ai-head-left{display:flex;align-items:center;gap:10px}
.ai-head-avatar{width:36px;height:36px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.ai-head-name{font-size:14px;font-weight:600}.ai-head-status{font-size:11px;opacity:.8}
.ai-dialog-close{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:4px}
.ai-dialog-body{flex:1;max-height:360px;overflow-y:auto;padding:14px}
.ai-welcome{font-size:12px;color:var(--ink2);line-height:1.6;margin-bottom:12px;padding:10px;background:#F8F8F8;border-radius:6px}
.ai-suggest-title{font-size:11px;color:var(--ink3);margin-bottom:6px}
.ai-suggest-btn{display:block;width:100%;text-align:left;background:none;border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--ink);cursor:pointer;margin-bottom:6px;font-family:inherit}
.ai-suggest-btn:hover{background:#F8F8F8}
.ai-suggest-icon{color:var(--red);margin-right:6px}
.ai-msg{padding:8px 12px;border-radius:8px;font-size:12px;line-height:1.5;margin-bottom:8px;max-width:90%}
.ai-msg.bot{background:#F8F8F8;color:var(--ink2);align-self:flex-start;border-bottom-left-radius:4px}
.ai-msg.user{background:var(--red);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.ai-input-row{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--border)}
.ai-input-row input{flex:1;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;outline:none;font-family:inherit;background:var(--bg)}
.ai-input-row input:focus{border-color:var(--red);background:#fff}
.ai-input-row button{background:var(--red);color:#fff;border:none;border-radius:8px;padding:0 16px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:500}
.ai-input-row button:hover{opacity:.9}
</style>
</head>
<body>
<header class="sys-header">
<div class="sys-header-inner">
<div class="sys-logo-area">
<div class="sys-logo">朝</div>
<div>
<div class="sys-title">朝阳区班干部智能化分析研判系统</div>
<div class="sys-subtitle">Chaoyang District Cadre Intelligent Analysis Platform</div>
</div>
</div>
<div class="sys-search-area">
<div class="sys-search">

<script>
function v(o,k,f){const a=o?.[k];return(a===null||a===undefined||a===""||a==="null")?f??"—":String(a)}
function has(o,k){const a=o?.[k];return a!==null&&a!==undefined&&a!==""&&a!=="null"}
let mf=[];function M(f){mf.push(f);return"—"}
function parseYear(s){if(!s)return null;const m=String(s).match(/(\d{4})/);return m?parseInt(m[1]):null}
function getAge(c){const y=parseYear(c.birth_date);return y?2026-y:null}
function getTenureYears(app){if(!app||!app.period)return 0;const m=String(app.period).match(/(\d{4})/);return m?Math.max(0,2026-parseInt(m[1])):0}
let curId='001',curData=null,radarChart=null,lineChart=null;
function goBack(){window.history.back()}
function doGlobalSearch(){const q=document.getElementById('globalSearch').value.trim();loadCadre(q||'001')}
function switchTab(t){document.querySelectorAll('.tab-item').forEach(e=>{e.classList.toggle('active',e.dataset.tab===t)});document.querySelectorAll('.tab-pane').forEach(e=>{e.classList.remove('active')});const m={quanxi:'paneQuanxi',kaohe:'paneKaohe',ai:'paneAI'};document.getElementById(m[t])?.classList.add('active');if(curData&&t==='kaohe')setTimeout(()=>initLineChart(),50);if(curData&&t==='quanxi')setTimeout(()=>{initRadarChart();drawBubbleChart()},50)}
async function loadCadre(id){curId=id;document.getElementById('globalSearch').value=id;document.querySelectorAll('.tab-pane').forEach(p=>{p.innerHTML='<div class="card"><div class="card-body" style="text-align:center;color:var(--ink3);padding:40px 0">加载中...</div></div>';p.classList.add('active')});try{const r=await fetch('/api/cadre/'+id);if(!r.ok){document.getElementById('sidebar').innerHTML='';document.querySelectorAll('.tab-pane').forEach(p=>{p.innerHTML='<div class="card"><div class="card-body" style="text-align:center;color:var(--ink3);padding:40px 0">干部 '+id+' 未找到</div></div>'});return}curData=await r.json();render(curData)}catch(e){document.querySelectorAll('.tab-pane').forEach(p=>{p.innerHTML='<div class="card"><div class="card-body" style="text-align:center;color:var(--red);padding:40px 0">API连接失败: '+e.message+'</div></div>'})}}
function render(data){
mf=[];const c=data.cadre||{},edu=data.educations||[],fam=data.relatives||[],apps=data.resumes||[],assess=data.annual_assessments||[],abtags=data.abilities||[],tags=data.tags||[],pers=data.personalities||[],scs=data.shortcomings||[],ffs=data.familiar_fields||[],pss=data.position_statuses||[];
const curApp=apps.length>0?apps[apps.length-1]:null;
const curPos=pss.length>0?pss[0].current_position:'';
const age=getAge(c);
renderSidebar(c,edu,fam,abtags,tags,pss,scs,curApp,curPos,age);
renderQuanxi(c,edu,apps,abtags,tags,pers,scs,ffs,pss);
renderKaohe(c,apps,abtags,assess,ffs,pss,scs);
renderAI(c,apps,abtags,pers,scs,ffs);
setTimeout(()=>{if(document.querySelector('.tab-pane.active')?.id==='paneKaohe')initLineChart();if(document.querySelector('.tab-pane.active')?.id==='paneQuanxi'){initRadarChart();drawBubbleChart()}},50);
}
function renderSidebar(c,edu,fam,abtags,tags,pss,scs,curApp,curPos,age){
const sb=document.getElementById('sidebar');
const relCount=fam.length;
const tagColors=['sb-tag-red','sb-tag-blue','sb-tag-green'];
const tagHtml=abtags.length>0?abtags.slice(0,6).map((t,i)=>'<span class="sb-tag '+tagColors[i%3]+'">'+v(t,'ability_trait','')+'</span>').join(''):'<span style="color:var(--ink3);font-size:12px">暂无标签</span>';
let eduHtml='';edu.forEach(e=>{const isFull=/(全日制|本科|硕士|博士)/.test(v(e,'edu_level',''));eduHtml+='<div class="sb-edu-entry"><div class="sb-edu-header"><span class="sb-edu-school">'+v(e,'school','')+'</span><span class="sb-edu-badge '+(isFull?'full':'part')+'">'+v(e,'edu_level','')+'</span></div><div class="sb-edu-detail"><span>'+v(e,'degree','')+'·'+v(e,'major','')+'</span></div></div>'});
const scCount=scs.length;
sb.innerHTML='<div class="sb-avatar"><div class="sb-avatar-img"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div><div class="sb-avatar-id">'+v(c,'cadre_id',M('cadre_id'))+'</div></div>'+'<div class="sb-position">'+curPos+'</div>'+'<div class="sb-info"><div class="sb-info-grid"><span class="sb-info-k">性别</span><span class="sb-info-v">'+v(c,'gender',M('gender'))+'</span><span class="sb-info-k">年龄</span><span class="sb-info-v">'+(age?age+'岁（'+v(c,'birth_date','')+'）':M('birth_date'))+'</span></div><div class="sb-info-full"><span class="sb-info-k" style="margin-right:8px">分管工作</span><span>'+v(c,'specialty',M('specialty'))+'</span></div></div>'+'<div class="sb-section"><div class="sb-section-title">干部标签</div><div class="sb-tags">'+tagHtml+'</div></div>'+'<div class="sb-section"><div class="sb-section-title">学历信息</div>'+eduHtml+'</div>'+'<div class="sb-section"><div class="sb-section-title"><span>关系图谱</span><span class="icon">&#127760;</span></div><div class="sb-rel-grid"><div><div class="sb-rel-num">'+relCount+'<em>人</em></div><div class="sb-rel-label">亲属</div></div></div></div>'+'<div class="sb-section"><div class="sb-attention-header"><span class="sb-section-title" style="margin-bottom:0;border:none;padding:0">需关注情况</span><a class="sb-view-detail">查看详情</a></div><div class="sb-attention-tags">'+(scCount>0?'<span class="sb-attention-tag">'+scCount+'项问题</span>':'<span class="sb-attention-tag">无异常</span>')+'</div></div>';
}
function renderQuanxi(c,edu,apps,abtags,tags,pers,scs,ffs,pss){
const p=document.getElementById('paneQuanxi');
const traits=abtags.map(t=>v(t,'ability_trait','')).filter(t=>t&&t!=='—');
const persStr=pers.map(p2=>v(p2,'trait','')).filter(t=>t&&t!=='—').join('、');
const bubbleData=[];
const colors=['#E8636A','#1565C0','#2E7D32','#F57F17','#7B1FA2'];
const positions=[[15,25,42],[32,12,32],[50,10,28],[58,28,48],[78,22,34],[22,48,44],[42,42,42],[58,52,40],[74,48,22],[68,62,26],[85,55,22],[48,65,20],[40,30,20],[70,14,20],[12,38,20]];
abtags.slice(0,15).forEach((t,i)=>{const pos=positions[i%positions.length];bubbleData.push({label:v(t,'ability_trait',''),x:pos[0],y:pos[1],r:pos[2],c:colors[i%colors.length]})});
ffs.forEach((f,i)=>{if(i<5){const pos=positions[(abtags.length+i)%positions.length];bubbleData.push({label:v(f,'field_name',''),x:pos[0],y:pos[1],r:20,c:'#E8636A'})}});
let bubbleHtml=bubbleData.length>0?bubbleData.map(b=>'<div class="bubble" style="left:'+b.x+'%;top:'+b.y+'%;width:'+b.r*2+'px;height:'+b.r*2+'px;background:'+b.c+';font-size:'+(b.r>30?12:10)+'px">'+b.label+'</div>').join(''):'<div style="text-align:center;color:var(--ink3);padding:60px 0">暂无能力标签数据</div>';
const career=apps.length>0?[...apps].reverse():[];
let careerHtml='';career.forEach((a,i)=>{
const isCur=v(a,'period','').includes('至今');
const rank=v(a,'rank','');const pos=v(a,'position','');const unit=v(a,'unit','');const period=v(a,'period','');
const durMatch=period.match(/(\d{4}\.\d{2}).*?(\d{4}\.\d{2}|至今)/);let dur='';if(durMatch){const s=durMatch[1].split('.');const e=durMatch[2].includes('至今')?'至今':durMatch[2].split('.');if(e==='至今')dur='至今';else{const y2=parseInt(e[0])-parseInt(s[0]);const m2=parseInt(e[1])-parseInt(s[1]);dur=(y2+(m2<0?0:1))+'年'+((m2+12)%12)+'个月'}}
const tags2=[];if(isCur&&/书记|主任/.test(pos))tags2.push('<span class="ct-tag ct-tag-red">一把手</span>');
if(/街|乡|镇/.test(unit))tags2.push('<span class="ct-tag ct-tag-green">街乡书记</span>');
if(/浦东|外区/.test(unit))tags2.push('<span class="ct-tag ct-tag-amber">挂职</span><span class="ct-tag ct-tag-blue">非本区经历</span>');
if(i===career.length-1)tags2.push('<span class="ct-tag ct-tag-blue">基层副职</span>');
careerHtml+='<div class="ct-item"><div class="ct-dot '+(isCur?'active':'')+'"></div>'+(rank?'<div class="ct-rank-badge">'+rank+(dur?'<span class="ct-duration">'+dur+'</span>':'')+'</div>':'')+'<div class="ct-pos">'+pos+'</div><div class="ct-period">'+period+(dur?' <em>· '+dur+'</em>':'')+'</div><div class="ct-desc">'+unit+'</div>'+(tags2.length?'<div class="ct-tags">'+tags2.join('')+'</div>':'')+'</div>';
});
let perfHtml='<div style="text-align:center;color:var(--ink3);padding:20px 0">暂无数据</div>';
if(pers.length>0){
const posEvals=pers.map(p2=>v(p2,'positive_eval','')).filter(t=>t&&t!=='—');
const negEvals=pers.map(p2=>v(p2,'negative_eval','')).filter(t=>t&&t!=='—');
const traits2=pers.map(p2=>v(p2,'trait','')).filter(t=>t&&t!=='—');
let items='';
if(traits2.length)items+='<div style="margin-bottom:8px"><span style="color:var(--red);font-weight:600">核心特点：</span>'+traits2.join('、')+'</div>';
if(posEvals.length)items+='<div style="margin-bottom:8px"><span style="color:var(--green);font-weight:600">正面评价：</span>'+posEvals.join('、')+'</div>';
if(negEvals.length)items+='<div><span style="color:var(--amber);font-weight:600">待改进：</span>'+negEvals.join('、')+'</div>';
if(items)perfHtml='<div style="font-size:12px;color:var(--ink2);line-height:1.8">'+items+'</div>';
}
let evalHtml='<div style="color:var(--ink3)">暂无评价数据</div>';
if(pers.length>0){
const evalParts=[];
pers.forEach(p2=>{
const t=v(p2,'trait','');const pos=v(p2,'positive_eval','');const neg=v(p2,'negative_eval','');
if(t&&t!=='—')evalParts.push('<div style="margin-bottom:4px"><b>性格特点：</b>'+t+'</div>');
if(pos&&pos!=='—')evalParts.push('<div style="margin-bottom:4px"><b>正面评价：</b>'+pos+'</div>');
if(neg&&neg!=='—')evalParts.push('<div><b>不足之处：</b>'+neg+'</div>');
});
if(evalParts.length)evalHtml='<div style="font-size:12px;color:var(--ink2);line-height:1.8">'+evalParts.join('')+'</div>';
}
p.innerHTML='<div class="quanxi-layout"><div class="quanxi-col"><div class="card"><div class="card-head"><div class="card-title">能力素质标签</div></div><div class="card-body"><div class="bubble-legend"><div class="bubble-legend-item"><div class="bubble-legend-dot" style="background:#E8636A"></div>熟悉领域</div><div class="bubble-legend-item"><div class="bubble-legend-dot" style="background:#1565C0"></div>能力特点</div><div class="bubble-legend-item"><div class="bubble-legend-dot" style="background:#2E7D32"></div>作风状态</div><div class="bubble-legend-item"><div class="bubble-legend-dot" style="background:#7B1FA2"></div>领导管理</div><div class="bubble-legend-item"><div class="bubble-legend-dot" style="background:#F57F17"></div>性格特征</div></div><div class="bubble-chart-wrap">'+bubbleHtml+'</div></div></div><div class="card"><div class="card-head"><div class="card-title">重点工作实绩</div></div><div class="card-body">'+perfHtml+'</div></div><div class="card"><div class="card-head"><div class="card-title">综合评价</div></div><div class="card-body"><div class="radar-layout"><div id="radarChart"></div><div class="ability-match-text"><div class="ability-match-title">能力匹配</div>'+evalHtml+'</div></div></div></div></div><div class="quanxi-col"><div class="card"><div class="card-head"><div class="card-title">成长经历</div></div><div class="card-body"><div class="career-tl">'+(careerHtml||'<div style="text-align:center;color:var(--ink3);padding:20px 0">暂无任职记录</div>')+'</div></div></div></div></div>';
}
function renderKaohe(c,apps,abtags,assess,ffs,pss,scs){
const p=document.getElementById('paneKaohe');
let assessHtml='';if(assess.length>0){const counts={};assess.forEach(a=>{const r=v(a,'result','');if(r&&r!=='—')counts[r]=(counts[r]||0)+1});const parts=Object.entries(counts).map(([k,n])=>'<em>'+n+'个'+k+'</em>').join(' · ');if(parts)assessHtml='<div class="assessment-summary"><div class="assessment-items">近五年来：'+parts+'</div></div>'}
let polHtml='<div style="text-align:center;color:var(--ink3);padding:20px 0">暂无数据</div>';
if(abtags.length>0){
const traitList=abtags.map(a=>v(a,'ability_trait','')).filter(t=>t&&t!=='—');
if(traitList.length){polHtml='<div style="font-size:12px;color:var(--ink2);line-height:1.8;margin-bottom:10px"><div style="font-weight:600;color:var(--ink);margin-bottom:6px">能力特征</div>'+traitList.map(t=>'<div style="padding:3px 0;border-bottom:1px dashed var(--border-lt)">• '+t+'</div>').join('')+'</div>'}
}
let eventHtml='<div style="text-align:center;color:var(--ink3);padding:20px 0">暂无数据</div>';
if(ffs.length>0){
const fieldList=ffs.map(f=>v(f,'field_name','')).filter(t=>t&&t!=='—');
if(fieldList.length){eventHtml='<div style="font-size:12px;color:var(--ink2);line-height:1.8"><div style="font-weight:600;color:var(--ink);margin-bottom:6px">分管领域</div><div style="display:flex;flex-wrap:wrap;gap:6px">'+fieldList.map(f=>'<span style="padding:4px 10px;border-radius:4px;background:var(--red-bg);color:var(--red);font-size:12px">'+f+'</span>').join('')+'</div></div>'}
}
p.innerHTML='<div class="kaohe-layout"><div class="kaohe-col"><div class="card"><div class="card-head"><div class="card-title">群众评价</div></div><div class="card-body"><div class="chart-subtitle">近三年民主测评优秀率</div><div id="lineChart"></div><div class="assessment-section"><div class="assessment-header">考核与获奖情况</div><div class="chart-subtitle" style="margin-top:8px">年度考核与奖励</div><div class="stat-row-note">（近五年来）</div>'+assessHtml+'</div></div></div></div><div class="kaohe-col"><div class="card"><div class="card-head"><div class="card-title">工作实绩<span class="card-title-sub">（县处级副职以来）</span></div></div><div class="card-body"><div class="sub-title">政治表现</div>'+polHtml+'<div class="sub-title">分管工作典型事例</div>'+eventHtml+'</div></div></div></div>';
}
function renderAI(c,apps,abtags,pers,scs,ffs){
const p=document.getElementById('paneAI');
const scHtml=scs.length>0?scs.map((s,i)=>{const classes=['org','mass','self'];const labels=['问题'+(i+1),'问题'+(i+1),'问题'+(i+1)];return'<div class="deficit-block '+classes[i%3]+'"><div class="deficit-badge '+classes[i%3]+'">'+labels[i%3]+'</div><div class="deficit-text">'+v(s,'content','')+'</div></div>'}).join(''):'<div style="text-align:center;color:var(--ink3);padding:20px 0">暂无数据</div>';
let negHtml='<div style="text-align:center;color:var(--ink3);padding:20px 0">暂无数据</div>';
if(scs.length>0){
const negItems=scs.map(s=>v(s,'content','')).filter(t=>t&&t!=='—');
if(negItems.length){negHtml='<div style="font-size:12px;color:var(--ink2);line-height:1.8">'+negItems.map((t,i)=>'<div style="padding:6px 0;border-bottom:1px dashed var(--border-lt)"><span style="color:var(--red);font-weight:600">问题'+(i+1)+'：</span>'+t+'</div>').join('')+'</div>'}
}
let careerHtml='';if(apps.length>0){const sorted=[...apps].reverse();careerHtml=sorted.map((a,i)=>{const period=v(a,'period','');const pos=v(a,'position','');const unit=v(a,'unit','');const isCur=period.includes('至今');return'<div class="growth-tl-item"><div class="growth-tl-dot '+(isCur?'active':'')+'"></div><div class="growth-tl-period">'+period+'</div><div class="growth-tl-stage">'+pos+'</div><div class="growth-tl-desc">'+unit+'</div></div>'}).join('')}
let dirHtml='<div style="text-align:center;color:var(--ink3);padding:20px 0">暂无数据</div>';
const dirParts=[];
if(ffs.length>0){
const fieldList=ffs.map(f=>v(f,'field_name','')).filter(t=>t&&t!=='—');
if(fieldList.length)dirParts.push('<div style="margin-bottom:10px"><div style="font-weight:600;color:var(--ink);margin-bottom:4px">熟悉领域</div><div style="display:flex;flex-wrap:wrap;gap:6px">'+fieldList.map(f=>'<span style="padding:4px 10px;border-radius:4px;background:var(--red-bg);color:var(--red);font-size:12px">'+f+'</span>').join('')+'</div></div>');
}
if(abtags.length>0){
const traitList=abtags.map(a=>v(a,'ability_trait','')).filter(t=>t&&t!=='—');
if(traitList.length)dirParts.push('<div style="margin-bottom:10px"><div style="font-weight:600;color:var(--ink);margin-bottom:4px">能力优势</div><div style="display:flex;flex-wrap:wrap;gap:6px">'+traitList.map(t=>'<span style="padding:4px 10px;border-radius:4px;background:var(--blue-bg);color:var(--blue);font-size:12px">'+t+'</span>').join('')+'</div></div>');
}
if(pers.length>0){
const posEvals=pers.map(p2=>v(p2,'positive_eval','')).filter(t=>t&&t!=='—');
if(posEvals.length)dirParts.push('<div><div style="font-weight:600;color:var(--ink);margin-bottom:4px">综合评价</div><div style="font-size:12px;color:var(--ink2);line-height:1.7">'+posEvals.join('、')+'</div></div>');
}
if(dirParts.length)dirHtml='<div style="font-size:12px">'+dirParts.join('')+'</div>';
p.innerHTML='<div class="ai成长-layout"><div class="ai成长-col"><div class="card"><div class="card-head"><div class="card-title">主要不足</div></div><div class="card-body">'+scHtml+'</div></div><div class="card"><div class="card-head"><div class="card-title">负面信息</div></div><div class="card-body">'+negHtml+'</div></div></div><div class="ai成长-col"><div class="card"><div class="card-head"><div class="card-title">成长轨迹</div></div><div class="card-body"><div class="growth-tl">'+(careerHtml||'<div style="text-align:center;color:var(--ink3);padding:20px 0">暂无数据</div>')+'</div></div></div><div class="card"><div class="card-head"><div class="card-title">培养使用方向</div></div><div class="card-body">'+dirHtml+'</div></div></div></div>';
}
function initLineChart(){
const el=document.getElementById('lineChart');if(!el)return;
if(lineChart){try{lineChart.dispose()}catch(e){}}
const assess=curData?.annual_assessments||[];
if(assess.length===0){el.innerHTML='<div style="text-align:center;color:var(--ink3);padding:40px 0">暂无数据</div>';return}
const resultCounts={};assess.forEach(a=>{const r=v(a,'result','');if(r&&r!=='—')resultCounts[r]=(resultCounts[r]||0)+1});
const years=Object.keys(resultCounts);const values=Object.values(resultCounts);
if(years.length===0){el.innerHTML='<div style="text-align:center;color:var(--ink3);padding:40px 0">暂无数据</div>';return}
lineChart=echarts.init(el);
lineChart.setOption({tooltip:{trigger:'axis'},xAxis:{type:'category',data:years,axisLine:{lineStyle:{color:'#ddd'}},axisLabel:{color:'#666'}},yAxis:{type:'value',axisLabel:{color:'#999'},splitLine:{lineStyle:{type:'dashed',color:'#eee'}}},series:[{type:'bar',data:values,lineStyle:{color:'#E8636A',width:2},itemStyle:{color:'#E8636A'},barWidth:'40%'}],grid:{left:50,right:20,top:20,bottom:30}});
}
function initRadarChart(){
const el=document.getElementById('radarChart');if(!el)return;
if(radarChart){try{radarChart.dispose()}catch(e){}}
const abtags=curData?.abilities||[];
if(abtags.length===0){el.innerHTML='<div style="text-align:center;color:var(--ink3);padding:60px 0">暂无能力数据</div>';return}
const base=75+abtags.length*1.5;
const vals=[78,90,88,80,82].map(v2=>Math.max(55,Math.min(98,Math.round((base+v2)/2))));
radarChart=echarts.init(el);
radarChart.setOption({radar:{indicator:[{name:'群众基础',max:100},{name:'能力匹配',max:100},{name:'班子融入情况',max:100},{name:'政治表现',max:100},{name:'专业匹配',max:100}],shape:'polygon',radius:'65%',center:['50%','52%'],splitNumber:4,axisName:{color:'#666',fontSize:11},splitLine:{lineStyle:{color:'#E5E5E5'}},splitArea:{areaStyle:{color:['rgba(255,255,255,.3)','rgba(245,245,245,.5)']}},axisLine:{lineStyle:{color:'#E5E5E5'}}},series:[{type:'radar',data:[{value:vals,name:'综合评价',lineStyle:{color:'#E8636A',width:2},areaStyle:{color:'rgba(232,99,106,.15)'},itemStyle:{color:'#E8636A'}}]}]});
}
function drawBubbleChart(){const wrap=document.querySelector('.bubble-chart-wrap');if(!wrap)return}
window.addEventListener('resize',()=>{if(radarChart)radarChart.resize();if(lineChart)lineChart.resize()});
function toggleAI(){document.getElementById('aiDialog').classList.toggle('open')}
function addMsg(text,role){const chat=document.getElementById('aiChat');const div=document.createElement('div');div.className='ai-msg '+role;div.textContent=text;chat.appendChild(div);chat.scrollTop=chat.scrollHeight}
function quickChat(topic){const dlg=document.getElementById('aiDialog');if(!dlg.classList.contains('open'))dlg.classList.add('open');addMsg(topic,'user');setTimeout(()=>{const name=v(curData?.cadre||{},'cadre_id','该干部');const replies={'查看所在班子画像':'正在调取干部 '+name+' 所在领导班子画像数据...','查看同岗位干部画像':'正在检索同岗位同级别干部数据，可对比工作实绩、能力雷达及成长轨迹...','生成班子搭配建议':'基于当前班子结构与本次考察材料，建议补充相关背景副职...','查看近三年成长趋势':'正在生成干部 '+name+' 近三年能力跃迁曲线...'};addMsg(replies[topic]||'好的，正在为您查询相关信息...','bot')},500)}
function sendMsg(){const input=document.getElementById('aiInput');const text=input.value.trim();if(!text)return;addMsg(text,'user');input.value='';setTimeout(()=>addMsg('已收到您的提问，正在分析处理中...','bot'),500)}
loadCadre('001');
</script>
